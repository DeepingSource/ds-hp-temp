name: Scheduled rebuild

# 예약 발행(B-3): 블로그 글의 미래 날짜는 articles.ts 가 이미 필터하지만,
# 정적 빌드라 재배포 없이는 그 날짜가 와도 반영되지 않는다. 매일 한 번 재빌드해
# "그날 발행 예정" 글이 자동으로 뜨게 한다.
#
# 필요 설정(1회): Vercel → 프로젝트 → Settings → Git → Deploy Hooks 에서 훅 생성 후,
#   GitHub → 리포 Settings → Secrets and variables → Actions → New repository secret
#   이름: VERCEL_DEPLOY_HOOK_URL, 값: 생성한 훅 URL
# 시크릿이 없으면 이 워크플로는 조용히 건너뛴다(실패하지 않음).

on:
  schedule:
    - cron: '5 15 * * *' # 매일 00:05 KST (UTC 15:05) — 예약 글 발행 시각
  workflow_dispatch: {} # 필요 시 수동 트리거

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL 시크릿이 없어 건너뜁니다."
            exit 0
          fi
          echo "Triggering scheduled rebuild…"
          curl -fsS -X POST "$HOOK_URL"
          echo "Done."
