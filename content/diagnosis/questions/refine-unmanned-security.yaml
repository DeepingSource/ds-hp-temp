# 진단 질문 뱅크 (diagnosis-v4-engine-plan §2-2 · v3 §3 승계) — gen이 diagnosis.json으로 컴파일.
# 편집 후 `npm run gen:content`. 3로케일 필수(빌드 검증 ③).
id: refine-unmanned-security
group: refine
phase: refine
kind: option-list
order: 55
appliesWhen:
  cluster:
  - unmanned:security_ops
text:
  ko: 어떤 상황에 가장 가까우신가요?
  en: Which situation is closest to yours?
  jp: どちらの状況に一番近いですか?
options:
- id: unmanned-theft-prevention
  label:
    ko: 도난이 발생해도 다음 날에야 알게 돼요
    en: We only find out about theft the next day
    jp: 盗難が起きても翌日にしか気づきません
  result: unmanned-theft-prevention
- id: unmanned-anomaly-detection
  label:
    ko: 냉장고 문 열림 같은 사소한 이상이 방치돼요
    en: Small issues like a fridge door left open go unnoticed
    jp: 冷蔵庫のドアが開いたままなど、小さな異常が放置されます
  result: unmanned-anomaly-detection
- id: unmanned-remote-monitoring
  label:
    ko: 여러 지점을 매번 방문해서 확인해야 해요
    en: I have to visit every location just to check on it
    jp: 複数拠点を毎回訪問して確認しないといけません
  result: unmanned-remote-monitoring
