# 진단 질문 뱅크 (diagnosis-v4-engine-plan §2-2 · v3 §3 승계) — gen이 diagnosis.json으로 컴파일.
# 편집 후 `npm run gen:content`. 3로케일 필수(빌드 검증 ③).
id: refine-mart-congestion
group: refine
phase: refine
kind: option-list
order: 60
signal: symptom
appliesWhen:
  cluster:
  - mart:congestion
text:
  ko: 계산대 혼잡이 어떤 패턴인가요?
  en: What's the checkout congestion pattern?
  jp: レジ混雑はどんなパターンですか?
options:
- id: peak
  label:
    ko: 특정 시간대에 몰려요
    en: It piles up at specific hours
    jp: 特定の時間帯に集中します
  evidence:
  - attribute: symptom
    value: peak
    weight: 1
  reflect:
    ko: 특정 시간대에 몰리는 혼잡이라면, 이 사례가 가장 가깝습니다.
    en: If congestion piles up at specific hours, this case is the closest match.
    jp: 特定の時間帯に集中する混雑なら、この事例が最も近いです。
- id: random
  label:
    ko: 예측이 안 되게 불규칙해요
    en: It's irregular and hard to predict
    jp: 予測できないほど不規則です
  evidence:
  - attribute: symptom
    value: random
    weight: 1
  reflect:
    ko: 예측이 어려운 불규칙한 혼잡이라면, 실시간 감지로 대응하는 이 방식이 맞습니다.
    en: If the congestion is irregular and hard to predict, this approach — responding on live signals — fits.
    jp: 予測しにくい不規則な混雑なら、リアルタイム検知で対応するこの方式が合います。
