# 진단 질문 뱅크 (diagnosis-v4-engine-plan §2-2 · v3 §3 승계) — gen이 diagnosis.json으로 컴파일.
# 편집 후 `npm run gen:content`. 3로케일 필수(빌드 검증 ③).
id: refine-cafe-turnover
group: refine
phase: refine
kind: option-list
order: 59
signal: symptom
appliesWhen:
  cluster:
  - cafe:merchandising
text:
  ko: 좌석 회전이 안 되는 양상이 어떤가요?
  en: How does the slow seat turnover show up?
  jp: 席の回転が悪いのはどんな様子ですか?
options:
- id: hotspot
  label:
    ko: 특정 좌석만 장시간 점유돼요
    en: Only certain seats stay occupied for hours
    jp: 特定の席だけ長時間占有されます
  evidence:
  - attribute: symptom
    value: hotspot
    weight: 1
  reflect:
    ko: 특정 좌석의 장기 점유가 문제라면, 이 사례가 가장 가깝습니다.
    en: If certain seats staying occupied is the problem, this case is the closest match.
    jp: 特定の席の長時間占有が問題なら、この事例が最も近いです。
- id: overall
  label:
    ko: 전체적으로 체류가 길어요
    en: Dwell time is long across the board
    jp: 全体的に滞在が長いです
  evidence:
  - attribute: symptom
    value: overall
    weight: 1
  reflect:
    ko: 전반적으로 체류가 길다면, 좌석 전체의 흐름을 읽는 이 방식이 맞습니다.
    en: If dwell is long across the board, this approach — reading the whole floor — fits.
    jp: 全体的に滞在が長いなら、席全体の流れを読むこの方式が合います。
