  ko: '"품목이 워낙 많아 진열이 자주 흐트러졌는데, 같은 기준으로 매장을 보게 되니 어느 지점이든 정돈된 모습을 유지하게 됐습니다."'
  en: '"With so many items, displays often slipped out of order, but seeing every store by the same standard means each location stays neat and tidy."'
  jp: 「商品があまりに多く陳列がよく崩れていましたが、同じ基準で店舗を見られるようになり、どの店舗でも整った状態を保てるようになりました。」
