  ko: 진열 일관성, 결품 방지, 고객 동선까지. 카테고리가 많은 드럭스토어 운영을 같은 기준으로 살펴 깔끔하고 안정적인 매장을 돕습니다.
  en: Display consistency, out-of-stock prevention, and customer flow. We watch the operations of category-heavy drugstores by the same standard, for clean and steady stores.
  jp: 陳列の一貫性、欠品の防止、顧客の動線まで。カテゴリーの多いドラッグストアの運営を同じ基準で見守り、整った安定した店舗を支援します。
