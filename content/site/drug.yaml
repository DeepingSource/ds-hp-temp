scenarios:
  - id: s1
    tag:
      ko: 진열
      en: Display
      jp: 陳列
    title:
      ko: 진열의 일관성을 모든 매장에
      en: Display consistency in every store
      jp: 陳列の一貫性をすべての店舗に
    body:
      ko: 카테고리가 많고 회전이 빠른 만큼 진열이 흐트러지기 쉽습니다. 매대 진열 상태를 같은 기준으로 살펴, 어느 매장이든 깔끔한 진열이 유지되도록 돕습니다.
      en: With many categories and fast turnover, displays slip out of order easily. We watch shelf display by the same standard, so every store keeps a clean, orderly look.
      jp: カテゴリーが多く回転が速いほど、陳列は崩れやすくなります。棚の陳列状態を同じ基準で見守り、どの店舗でも整った陳列が保たれるよう支援します。
  - id: s2
    tag:
      ko: 결품
      en: Out-of-stock
      jp: 欠品
    title:
      ko: 인기 품목의 빈자리를 먼저
      en: Catch the gaps in popular items first
      jp: 人気商品の空きを先に
    body:
      ko: 찾는 손님이 많은 품목일수록 빈 매대가 곧 이탈로 이어집니다. 결품 신호를 빠르게 알려 채워야 할 매대를 먼저 확인하도록 돕습니다.
      en: The more in-demand an item, the faster an empty shelf turns into a walk-away. We flag out-of-stock signals quickly, so you check the shelves to restock first.
      jp: 求めるお客様が多い商品ほど、空いた棚はすぐ離脱につながります。欠品のサインをすばやくお知らせし、補充すべき棚を先に確認できるよう支援します。
  - id: s3
    tag:
      ko: 동선
      en: Customer flow
      jp: 動線
    title:
      ko: 고객 동선을 운영에 반영
      en: Bring customer flow into operations
      jp: 顧客の動線を運営に反映
    body:
      ko: 사람이 많이 머무는 구역과 지나치는 구역의 흐름을 살핍니다. 진열과 배치를 점검하는 근거로 활용해 매장 경험을 다듬도록 돕습니다.
      en: We watch the flow through areas where people linger and areas they pass by — a basis for reviewing display and layout and refining the store experience.
      jp: 人が多く留まる区域と通り過ぎる区域の流れを見守ります。陳列と配置を点検する根拠として活用し、店舗体験を整えられるよう支援します。
resultsLine:
  ko: 첫 검토 히트맵으로 20대 고객의 관심 구역을 찾아 HOT ZONE 진열을 조정한 드럭스토어는 매출이 약 15% 늘었습니다.
  en: A drugstore that used first-glance heatmaps to find where customers in their 20s look — and rearranged its hot zone — saw revenue rise about 15%.
  jp: ファーストビューのヒートマップで20代のお客様の関心エリアを見つけ、HOT ZONEの陳列を調整したドラッグストアは売上が約15%伸びました。
resultsNote:
  ko: "* 고객사 사례 기준 예시 — 매장 조건에 따라 다를 수 있습니다."
  en: "* Illustrative, based on customer cases — results vary by store conditions."
  jp: "* 導入事例に基づく例 — 店舗条件により異なる場合があります。"
