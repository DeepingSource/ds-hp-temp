heroTitle:
  ko: 보는 AI를 넘어, 운영하는 AI.
  en: Beyond seeing. AI that operates.
  jp: 見るAIを超え、運営するAIへ。
heroSub:
  ko: 대시보드는 숫자를 보여줍니다. saai agent는 그 숫자로 오늘 무엇을 바꿀지까지 말합니다.
  en: A dashboard shows you the numbers. saai agent tells you what to change today.
  jp: ダッシュボードは数字を見せます。saai agent は、その数字で今日何を変えるかまで伝えます。
ctaPrimary:
  ko: 도입 상담 신청
  en: Request a consultation
  jp: 導入のご相談
ctaSecondary:
  ko: 제안 예시 보기
  en: See sample recommendations
  jp: ご提案の例を見る
evolutionEyebrow:
  ko: 대시보드의 진화
  en: How the dashboard evolves
  jp: ダッシュボードの進化
evolutionHeading:
  ko: 보여주는 화면에서, 먼저 말을 거는 화면으로
  en: From a screen that shows to a screen that speaks first
  jp: 見せる画面から、先に話しかける画面へ
evolutionSub:
  ko: 같은 데이터라도, 화면이 무엇을 해주느냐에 따라 하루가 달라집니다.
  en: The same data changes your day, depending on what the screen does with it.
  jp: 同じデータでも、画面が何をしてくれるかで一日が変わります。
evolutionProactiveCta:
  ko: 지금 어떻게 동작하는지 보기
  en: See how it already works
  jp: 実際の動きを見る
evolution:
  - id: viewer
    tag:
      ko: saai insight
      en: saai insight
      jp: saai insight
    title:
      ko: 보여줍니다
      en: It shows you
      jp: 見せてくれます
    desc:
      ko: 어제 몇 명이 왔고, 어디에 머물렀는지 정확히 보여줍니다. 무엇을 할지는, 보는 사람의 몫.
      en: How many came yesterday, where they lingered — shown precisely. What to do is still on you.
      jp: 昨日何人が来て、どこに留まったかを正確に見せます。何をするかは、見る人次第。
  - id: interactive
    tag:
      ko: saai agent · 지금
      en: saai agent · today
      jp: saai agent · 現在
    title:
      ko: 물으면 답합니다
      en: It answers when asked
      jp: 尋ねれば答えます
    desc:
      ko: 물으면, 근거와 함께 답합니다.
      en: Ask, and it answers — with the evidence.
      jp: 尋ねれば、根拠とともに答えます。
  - id: proactive
    tag:
      ko: 가는 방향
      en: Where it is going
      jp: 向かう先
    title:
      ko: 먼저 말을 겁니다
      en: It speaks first
      jp: 先に話しかけます
    desc:
      ko: 묻기 전에, 오늘 놓친 것을 먼저 짚어줍니다.
      en: Before you ask, it points out what today is missing.
      jp: 尋ねる前に、今日の見落としを先に示します。
techBridgeText:
  ko: saai agent가 이렇게 판단하는 이유 — 딥핑소스의 Agentic AI 접근 철학
  en: Why saai agent judges the way it does — our approach to agentic AI
  jp: saai agent がこう判断する理由 — ディーピングソースのAgentic AIへの考え方
techBridgeCta:
  ko: 접근 철학 보기
  en: See the principles
  jp: 哲学を見る
stepsHeading:
  ko: 숫자에서, 무엇을 바꿀지까지
  en: From the number to what to change
  jp: 数字から、次の一手まで
stepsSub:
  ko: POS도 비전도 한 엔진에서 — saai agent의 하루는 이렇게 흘러갑니다.
  en: POS and vision in one engine — here is how a day with saai agent runs.
  jp: POSもビジョンもひとつのエンジンで — saai agent の一日はこう流れます。
pricingHeading:
  ko: 한 매장이 아니라, 브랜드 전체가
  en: Not one store — your whole brand
  jp: 一店舗ではなく、ブランド全体が
pricingSub:
  ko: 전국 모든 매장이 한 화면에. 단일 매장부터 다점포 본사까지, 규모에 맞춰 구성합니다.
  en: Every store on one screen. From a single shop to a multi-store HQ, configured to your scale.
  jp: 全国すべての店舗を一画面に。単一店舗から多店舗本部まで、規模に合わせて構成します。
pricingCta:
  ko: 요금 안내 보기
  en: See pricing
  jp: 料金のご案内を見る
finalHeading:
  ko: 지켜보는 데서, 운영하는 데로.
  en: From watching to operating.
  jp: 見守るだけから、運営する側へ。
finalSub:
  ko: 영상은 남기지 않습니다 — 동선과 전환만 기록합니다. 매장의 다음은, 함께 결정합니다.
  en: We keep no footage — only flow and conversion. What’s next for your store, we decide together.
  jp: 映像は残しません — 動線と転換だけを記録します。店舗の次は、ともに決めます。
finalCta:
  ko: 도입 상담 신청
  en: Request a consultation
  jp: 導入のご相談
steps:
  - id: restock
    title:
      ko: 지금, 매대부터 채울까요?
      en: Restock the shelf now?
      jp: 今、棚から補充しますか？
    desc:
      ko: 품절되기 전에, 먼저 알려줍니다.
      en: It warns you before the shelf runs out.
      jp: 品切れの前に、先に知らせます。
  - id: order
    title:
      ko: 말이 아니라, 발주서로
      en: Not a note — a PO
      jp: 言葉ではなく、発注書で
    desc:
      ko: 반복되는 패턴은, 발주서로 바로 잇습니다.
      en: Recurring patterns become a purchase order, drafted for you.
      jp: 繰り返すパターンは、そのまま発注書に。
  - id: human
    title:
      ko: 권고는 AI, 결정은 사람
      en: AI recommends, people decide
      jp: 推奨はAI、決定は人
    desc:
      ko: 권고는 AI가, 결정은 언제나 사람이.
      en: The AI advises; the call is always yours.
      jp: 推奨はAI、決定はいつも人が。
  - id: improve
    title:
      ko: 쓸수록, 스스로 나아집니다
      en: The more you use it, the better it gets
      jp: 使うほど、自ら良くなります
    desc:
      ko: 남긴 지적이, 다음 제안에 반영됩니다.
      en: Your feedback shapes the next recommendation.
      jp: 残した指摘が、次の提案に反映されます。
