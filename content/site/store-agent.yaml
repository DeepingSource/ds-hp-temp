heroTitle:
  ko: 보는 AI를 넘어, 운영하는 AI.
  en: Beyond seeing. AI that operates.
  jp: 見るAIを超え、運営するAIへ。
heroSub:
  ko: 대시보드는 숫자를 보여줍니다. saai agent는 그 숫자로 무엇을 할지까지 말합니다 — 매장에서 무엇을 바꿀지 함께 결정합니다.
  en: A dashboard shows you the numbers. saai agent tells you what to do with them — and makes the next move with you.
  jp: ダッシュボードは数字を見せます。saai agent は、その数字で何をすべきかまで伝え、店舗の次の一手をともに決めます。
ctaPrimary:
  ko: 도입 상담 신청
  en: Request a consultation
  jp: 導入のご相談
ctaSecondary:
  ko: 제안 예시 보기
  en: See sample recommendations
  jp: ご提案の例を見る
stepsHeading:
  ko: 숫자에서, 무엇을 바꿀지까지
  en: From the number to the next move
  jp: 数字から、次の一手まで
stepsSub:
  ko: 매장을 완벽하게 하려면 봐야 할 게 너무 많습니다. POS도 비전도 한 엔진에서 — saai agent가 그 짐을 나눠, 지금 무엇을 할지 짚어줍니다.
  en: Running a perfect store means watching far too much for one person. POS and vision in one engine — saai agent shoulders the load and tells you what to do right now.
  jp: 店舗を完璧にするには、見るべきものが多すぎます。POSもビジョンもひとつのエンジンで — saai agent がその負担を分かち合い、今すべきことを示します。
pricingHeading:
  ko: 한 매장이 아니라, 브랜드 전체가
  en: Not one store — your whole brand
  jp: 一店舗ではなく、ブランド全体が
pricingSub:
  ko: 본부에서는 전국 모든 매장이 한 화면에 — 방문·구매·전환율로, 실시간으로. 단일 매장부터 다점포 본사까지 운영 규모에 맞춰 구성합니다.
  en: At HQ, every store across the country on one screen — footfall, purchases, and conversion, in real time. From a single store to a multi-location headquarters, configured to your scale.
  jp: 本部では、全国すべての店舗を一画面に — 来店・購入・転換率を、リアルタイムで。単一店舗から多店舗の本部まで、運営規模に合わせて構成します。
pricingCta:
  ko: 요금 안내 보기
  en: See pricing
  jp: 料金のご案内を見る
finalHeading:
  ko: 지켜보는 데서, 운영하는 데로.
  en: From watching to operating.
  jp: 見守るだけから、運営する側へ。
finalSub:
  ko: 영상은 남기지 않습니다. 신원은 즉시 지우고, 동선과 전환만 기록합니다. saai agent가 매장의 다음을 함께 결정합니다.
  en: We keep no footage. Identities are erased on the spot — only flow and conversion are recorded. saai agent decides your store’s next move with you.
  jp: 映像は残しません。身元はその場で消し、動線と転換だけを記録します。saai agent が店舗の次を、ともに決めます。
finalCta:
  ko: 도입 상담 신청
  en: Request a consultation
  jp: 導入のご相談
steps:
  - id: restock
    title:
      ko: 지금, 매대부터 채울까요?
      en: Restock the shelf now?
      jp: 今、棚から補充しますか？
    desc:
      ko: 점심 학생 방문이 평소보다 18% 많습니다. 인기 음료 세 종이 한 시간 안에 동날 것 같아요. 지금 백룸 재고로 매대부터 채울지 짚어드립니다.
      en: "Lunchtime student traffic is up 18%. Three top drinks will sell out within the hour. saai agent asks: pull from the backroom and restock now?"
      jp: ランチタイムの学生来店が普段より18%多めです。人気ドリンク3種が1時間以内に品切れしそうです。バックルームの在庫で今すぐ補充するか、お知らせします。
  - id: order
    title:
      ko: 말이 아니라, 발주서로
      en: Not a note — a PO
      jp: 言葉ではなく、発注書で
    desc:
      ko: 반복되는 패턴은 발주로 잇습니다. 내일 점심 수요까지 내다보고 삼각김밥 40개를 오픈 전 입고로 — 발주서를 바로 만들어 드립니다.
      en: Recurring patterns become orders. Looking ahead to tomorrow’s lunch demand, 40 rice balls in before open — the purchase order is drafted for you.
      jp: 繰り返すパターンは発注へつなげます。明日のランチ需要まで見越して、おにぎり40個を開店前入荷に — 発注書をその場で作成します。
  - id: human
    title:
      ko: 권고는 AI, 결정은 사람
      en: AI recommends, people decide
      jp: 推奨はAI、決定は人
    desc:
      ko: 권고하고, 승인받고, 실행하고, 결과로 학습합니다. 권고는 AI가, 결정은 언제나 사람이.
      en: Recommend, approve, act, learn from the outcome. The AI advises; the call is always yours.
      jp: 推奨し、承認を受け、実行し、結果から学びます。推奨はAIが、決定はいつも人が。
  - id: improve
    title:
      ko: 쓸수록, 스스로 나아집니다
      en: The more you use it, the better it gets
      jp: 使うほど、自ら良くなります
    desc:
      ko: 남긴 지적이 다음 개선으로 이어집니다. 주간 리포트는 챗에서 바로 고치고, 대화는 흐름을 기억합니다.
      en: Your feedback becomes the next improvement. Fix the weekly report right in the chat — and the conversation keeps its thread.
      jp: 残した指摘が、次の改善につながります。週次レポートはチャットでそのまま直せて、会話は流れを覚えています。
