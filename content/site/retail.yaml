scenarios:
  - id: s1
    tag:
      ko: 결품
      en: Out-of-stock
      jp: 欠品
    title:
      ko: 빈 매대가 매출이 됩니다
      en: An empty shelf is lost revenue
      jp: 空いた棚は売上になります
    body:
      ko: 잘 팔리는 상품일수록 매대가 비는 순간 매출이 빠져나갑니다. 매대 상태를 상시로 살펴 결품 신호를 빠르게 알려, 채워야 할 때를 놓치지 않도록 돕습니다.
      en: The better a product sells, the more revenue slips away the moment its shelf goes empty. We watch shelf status continuously and flag out-of-stock signals quickly, so you never miss the moment to restock.
      jp: よく売れる商品ほど、棚が空いた瞬間に売上が逃げていきます。棚の状態を常時見守って欠品のサインをすばやくお知らせし、補充すべきタイミングを逃さないよう支援します。
  - id: s2
    tag:
      ko: 운영 편차
      en: Inconsistency
      jp: 運営のばらつき
    title:
      ko: 매장마다 다른 운영을 하나로
      en: Many stores, run as one
      jp: 店舗ごとに異なる運営をひとつに
    body:
      ko: 같은 브랜드라도 매장마다 진열, 청결, 응대 수준이 다릅니다. 매장별 운영 상태를 같은 기준으로 비교해, 잘하는 매장의 기준을 모든 매장으로 넓힙니다.
      en: Even within one brand, display, cleanliness, and service vary by store. We compare each store by the same standard, so the best stores set the bar for every store.
      jp: 同じブランドでも、店舗ごとに陳列・清潔・接客の水準は異なります。店舗ごとの運営状態を同じ基準で比較し、優れた店舗の基準をすべての店舗へ広げます。
  - id: s3
    tag:
      ko: 이상 감지
      en: Anomaly detection
      jp: 異常検知
    title:
      ko: 놓치기 쉬운 순간을 먼저
      en: Catch the moments easily missed
      jp: 見逃しやすい瞬間を先に
    body:
      ko: 혼잡, 낙상, 비정상 동선처럼 사람이 매번 지켜보기 어려운 상황을 대신 살핍니다. 이상 신호가 보이면 담당자에게 즉시 전달해 빠른 대응을 돕습니다.
      en: Crowding, falls, abnormal movement — situations hard for people to watch every time, watched for you. When an anomaly appears, it is sent to the right person at once for a fast response.
      jp: 混雑・転倒・異常な動線など、人が毎回見守るのが難しい状況を代わりに見守ります。異常のサインがあれば担当者へただちにお伝えし、迅速な対応を支援します。
beforeAfter:
  - id: ba1
    before:
      ko: 매대가 빈 줄 모르고 지나가다 뒤늦게 발견
      en: Walking past an empty shelf, noticing too late
      jp: 棚が空いたことに気づかず通り過ぎ、後から発見
    after:
      ko: 결품 신호를 받아 채워야 할 매대를 먼저 확인
      en: Getting an out-of-stock signal and checking the shelf first
      jp: 欠品のサインを受け取り、補充すべき棚を先に確認
  - id: ba2
    before:
      ko: 매장마다 제각각인 운영 수준
      en: Operating standards that differ store by store
      jp: 店舗ごとにばらばらな運営水準
    after:
      ko: 본사 기준으로 정렬된 다점포 운영
      en: Multi-store operations aligned to the HQ standard
      jp: 本部基準に揃った多店舗運営
  - id: ba3
    before:
      ko: 사람이 종일 모니터를 지켜봐야 하는 일
      en: Someone watching the monitor all day
      jp: 人が一日中モニターを見守る作業
    after:
      ko: 이상 상황만 골라 알려주는 선택적 확인
      en: Selective review — only anomalies are surfaced
      jp: 異常な状況だけを選んでお知らせする選択的な確認
resultsLine:
  ko: 전환율 높은 진열을 통행 많은 자리로 옮긴 편의점은 매출이 약 20%, 픽업 데이터로 결제 시 추가 제안을 붙인 패션 매장은 객단가가 약 10% 늘었습니다.
  en: A convenience store that moved its high-converting display into the busiest path saw revenue rise about 20%; a fashion store that added checkout suggestions from pickup data lifted basket size about 10%.
  jp: 転換率の高い陳列を人通りの多い場所へ移したコンビニは売上が約20%、ピックアップデータでレジ時の追加提案を加えたファッション店は客単価が約10%伸びました。
resultsNote:
  ko: "* 고객사 사례 기준 예시 — 매장 조건에 따라 다를 수 있습니다."
  en: "* Illustrative, based on customer cases — results vary by store conditions."
  jp: "* 導入事例に基づく例 — 店舗条件により異なる場合があります。"
