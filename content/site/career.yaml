# Careers 페이지 카피 (/company/career). culture 2·3번 desc 의 {nvidiaPartner} {patents}
# 토큰은 company 싱글톤 값으로 빌드 시 치환됨. mailto·아이콘은 코드 유지.
badge:
  ko: Careers
  en: Careers
  jp: Careers
heroMaster:
  ko: 모든 공간을, 완벽하게 —
  en: Perfect every space —
  jp: すべての空間を、完璧に —
heroMasterAccent:
  ko: 그 한 회사를 함께 짜는 자리
  en: the role of weaving that one company
  jp: そのひとつの会社をともに織りなす場所
heroSub:
  ko: 지금 공개된 채용 공고는 없습니다. 함께하고 싶은 마음이 있다면 언제든 먼저 이야기를 들려주세요.
  en: We have no open roles right now. If you’d like to work with us, reach out anytime — we’d love to hear from you.
  jp: 現在、公開中の募集はありません。一緒に働きたい方は、いつでもまずはお声がけください。
cultureEyebrow:
  ko: Why DeepingSource
  en: Why DeepingSource
  jp: Why DeepingSource
cultureHeading:
  ko: 왜 우리와 일하는가
  en: Why work with us
  jp: なぜ私たちと働くのか
cultureSub:
  ko: 복지 목록이 아니라, 여기서만 할 수 있는 일을 먼저 말합니다.
  en: Not a list of perks — first, the work you can only do here.
  jp: 福利厚生のリストではなく、ここでしかできない仕事を、まずお話しします。
benefitsEyebrow:
  ko: Benefits & Culture
  en: Benefits & Culture
  jp: Benefits & Culture
benefitsHeading:
  ko: 잘 일하기 위한 환경
  en: An environment to do great work
  jp: よい仕事のための環境
benefitsSub:
  ko: 좋은 결과는 좋은 환경에서 나옵니다. 집중하고 성장할 수 있도록 지원합니다.
  en: Good results come from a good environment. We support you to focus and grow.
  jp: よい結果は、よい環境から生まれます。集中し、成長できるよう支援します。
rolesEyebrow:
  ko: Talent Pool
  en: Talent Pool
  jp: Talent Pool
rolesHeading:
  ko: 인재 풀에 등록하세요
  en: Join our talent pool
  jp: 人材プールに登録
rolesSub:
  ko: 지금은 공개된 공고가 없습니다. 하지만 좋은 동료는 늘 찾고 있습니다. 인재 풀에 등록해 두시면, 맞는 자리가 열릴 때 가장 먼저 연락드립니다.
  en: We have no open roles right now, but we’re always looking for great people. Register your interest and we’ll reach out first when a fitting role opens.
  jp: 現在、公開中の募集はありません。ですが、よい仲間はいつでも探しています。人材プールにご登録いただければ、合うポジションが開いた際に最初にご連絡します。
rolesApply:
  ko: 인재 풀 등록
  en: Register your interest
  jp: 人材プールに登録
processEyebrow:
  ko: Process
  en: Process
  jp: Process
processHeading:
  ko: 채용은 이렇게 진행됩니다
  en: How hiring works
  jp: 採用の進め方
processSub:
  ko: 복잡하지 않게, 서로를 충분히 알 수 있도록.
  en: Simple, with enough room for both sides to get to know each other.
  jp: 複雑にせず、お互いを十分に知れるように。
