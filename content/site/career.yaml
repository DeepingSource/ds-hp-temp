  ko: 채용 문의
  en: Careers inquiry
  jp: 採用のお問い合わせ
ctaHeading:
  ko: 맞는 자리가 없어도 괜찮습니다
  en: No matching role? That’s okay
  jp: 合うポジションがなくても大丈夫です
ctaSub:
  ko: 함께하고 싶은 마음이 있다면, 먼저 이야기를 들려주세요
  en: If you’d like to join us, tell us your story first.
  jp: ともに働きたいお気持ちがあれば、まずはお話を聞かせてください。
