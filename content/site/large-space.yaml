  ko: Spatial AI · MTMC
  en: Spatial AI · MTMC
  jp: Spatial AI · MTMC
mtmcHeading:
  ko: 여러 카메라를 하나의 공간으로
  en: Many cameras, as one space
  jp: 複数のカメラをひとつの空間へ
mtmcBody:
  ko: MTMC(Multi-Target Multi-Camera) 공간 AI는 흩어진 여러 카메라의 시야를 하나의 공간으로 이어 붙입니다. 넓은 매장과 층을 넘나드는 흐름도 끊김 없이 이해해, 대형 공간을 한 매장처럼 살필 수 있도록 돕습니다.
  en: MTMC (Multi-Target Multi-Camera) Spatial AI stitches the views of scattered cameras into a single space. It follows flow seamlessly across wide floors and levels, so a large space can be watched like one store.
  jp: MTMC(Multi-Target Multi-Camera)空間AIは、散らばった複数カメラの視野をひとつの空間へとつなぎ合わせます。広い店舗や階をまたぐ流れも途切れなく理解し、大型空間をひとつの店舗のように見守れるよう支援します。
mtmcLink:
  ko: 공간 AI 기술 자세히 보기
  en: Explore Spatial AI technology
  jp: 空間AI技術を詳しく見る
mtmcItems:
  ko:
    - 여러 카메라 시야를 하나의 공간 좌표로 통합
    - 층과 구역을 넘나드는 연속된 흐름 추적
    - 구역별 혼잡과 동선을 같은 기준으로 비교
  en:
    - Unify multiple camera views into one spatial coordinate system
    - Track continuous flow across floors and zones
    - Compare zone-by-zone crowding and flow by the same standard
  jp:
    - 複数カメラの視野をひとつの空間座標に統合
    - 階と区域をまたぐ連続した流れの追跡
    - 区域ごとの混雑と動線を同じ基準で比較
quote:
  ko: '"넓고 층이 많아 어디가 붐비는지 파악이 어려웠는데, 전체 공간을 한 화면으로 보니 인력 배치와 안내를 미리 준비할 수 있게 됐습니다."'
  en: '"It was large and multi-level, so it was hard to tell where it was crowded — but seeing the whole space on one screen lets us prepare staffing and guidance in advance."'
  jp: 「広く階数が多くどこが混んでいるか把握が難しかったのですが、空間全体を一つの画面で見ることで、人員配置と案内を前もって準備できるようになりました。」
