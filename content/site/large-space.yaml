scenarios:
  - id: s1
    tag:
      ko: 혼잡 관리
      en: Crowd management
      jp: 混雑管理
    title:
      ko: 넓은 공간의 흐름을 한눈에
      en: See the flow of a vast space at a glance
      jp: 広い空間の流れをひと目で
    body:
      ko: 넓고 층이 많은 공간일수록 어디가 붐비는지 파악하기 어렵습니다. 구역별 혼잡 흐름을 한 화면에서 살펴, 인력 배치와 안내를 미리 준비하도록 돕습니다.
      en: The larger and more multi-level a space, the harder it is to tell where it’s crowded. Watch zone-by-zone crowd flow on one screen, and prepare staffing and guidance in advance.
      jp: 広く階数の多い空間ほど、どこが混んでいるか把握しにくくなります。区域ごとの混雑の流れを一つの画面で見守り、人員配置と案内を前もって準備できるよう支援します。
  - id: s2
    tag:
      ko: 동선 분석
      en: Flow analysis
      jp: 動線分析
    title:
      ko: 방문객 동선을 공간 운영에
      en: Bring visitor flow into space operations
      jp: 来訪者の動線を空間運営に
    body:
      ko: 입구부터 매장, 편의시설까지 이어지는 동선의 흐름을 살핍니다. 머무는 구역과 비는 구역을 파악해 배치와 안내 동선을 다듬는 근거로 활용하도록 돕습니다.
      en: We watch the flow from entrance to stores to amenities. Identify where people linger and where they don’t — a basis for refining layout and guidance routes.
      jp: 入口から店舗、付帯施設まで続く動線の流れを見守ります。留まる区域と空く区域を把握し、配置と案内動線を整える根拠として活用できるよう支援します。
  - id: s3
    tag:
      ko: 이상 감지
      en: Anomaly detection
      jp: 異常検知
    title:
      ko: 사각지대를 줄이는 이상 감지
      en: Anomaly detection with fewer blind spots
      jp: 死角を減らす異常検知
    body:
      ko: 넓은 공간일수록 사람이 모든 곳을 지켜보기 어렵습니다. 혼잡 과밀, 낙상, 비정상 상황 같은 신호를 살펴 담당자에게 즉시 전달, 빠른 대응을 돕습니다.
      en: The larger the space, the harder for people to watch everywhere. We watch signals like overcrowding, falls, and abnormal situations, and send them to the right person at once for a fast response.
      jp: 広い空間ほど、人がすべての場所を見守るのは困難です。過密、転倒、異常な状況といったサインを見守り、担当者へただちにお伝えして迅速な対応を支援します。
resultsLine:
  ko: 테마·팝업 전시의 관심도를 정량화해 배치를 조정한 전시 공간은 방문객이 약 30% 늘었습니다.
  en: An exhibition space that quantified interest in themed and pop-up zones — and rearranged accordingly — saw visitors rise about 30%.
  jp: テーマ・ポップアップ展示への関心度を定量化し、配置を調整した展示空間は、来場者が約30%増えました。
resultsNote:
  ko: "* 고객사 사례 기준 예시 — 매장 조건에 따라 다를 수 있습니다."
  en: "* Illustrative, based on customer cases — results vary by store conditions."
  jp: "* 導入事例に基づく例 — 店舗条件により異なる場合があります。"
