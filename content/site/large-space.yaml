heroSub:
  ko: 아무리 넓은 공간도 하나의 매장처럼. 혼잡 관리, 동선 분석, 이상 감지를 같은 기준으로 통합해 대형 공간 운영을 돕습니다.
  en: However large the space, run it like one store. We unify crowd management, flow analysis, and anomaly detection under the same standard to support large-space operations.
  jp: どれほど広い空間も、ひとつの店舗のように。混雑管理、動線分析、異常検知を同じ基準で統合し、大型空間の運営を支援します。
