errSubmitFailed:
  ko: 상담 신청에 실패했습니다. 다시 시도해주세요.
  en: Submission failed. Please try again.
  jp: お申し込みに失敗しました。もう一度お試しください。
errTimeout:
  ko: 요청 시간이 초과되었습니다. 다시 시도해주세요.
  en: The request timed out. Please try again.
  jp: リクエストがタイムアウトしました。もう一度お試しください。
errGeneric:
  ko: 일시적인 오류입니다. 잠시 후 다시 시도해 주세요.
  en: A temporary error occurred. Please try again shortly.
  jp: 一時的なエラーが発生しました。しばらくしてからもう一度お試しください。
