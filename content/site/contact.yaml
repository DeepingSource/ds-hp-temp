  ko: 신뢰받는 파트너
  en: Trusted partners
  jp: 信頼されるパートナー
partnerText:
  ko: 올리브영, BGF CU, 코리아세븐, CJ푸드빌 등 주요 브랜드가 먼저 선택했습니다.
  en: Leading brands chose us first, including Olive Young, BGF CU, Korea Seven, and CJ Foodville.
  jp: オリーブヤング、BGF CU、コリアセブン、CJフードビルなどの主要ブランドにいち早く選ばれています。
