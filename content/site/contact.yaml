provenLabel:
  ko: 예상 도입 효과
  en: Projected impact
  jp: 想定される導入効果
provenText:
  ko: 야간 인건비 월 약 80만 원 절감 — 자사 시뮬레이션 수치 기준
  en: Overnight labor costs down about ₩800,000 a month — based on our own simulations.
  jp: 夜間人件費を月あたり約80万ウォン削減 — 自社シミュレーション値ベース。
