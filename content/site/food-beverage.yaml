quote:
  ko: '"피크 타임에 직접 다 챙기기 어려웠는데, 붐비는 흐름과 위생 상태를 같이 보니 미리 준비하게 됩니다. 직원이 바뀌어도 운영이 흔들리지 않아요."'
  en: '"It was hard to handle everything myself at peak time, but seeing the rush and hygiene together lets me prepare in advance. Even when staff change, operations don’t waver."'
  jp: 「ピークタイムにすべてを自分で見るのは難しかったのですが、混み合う流れと衛生状態を一緒に見ることで前もって準備できます。スタッフが替わっても運営がぶれません。」
