scenarios:
  - id: s1
    tag:
      ko: 위생
      en: Hygiene
      jp: 衛生
    title:
      ko: 매장 위생을 일관된 기준으로
      en: Hygiene held to one standard
      jp: 店舗の衛生を一貫した基準で
    body:
      ko: 청결은 매장의 첫인상이자 신뢰입니다. 정리·청결 상태를 같은 기준으로 살펴, 바쁜 시간대에도 위생 수준이 흔들리지 않도록 돕습니다.
      en: Cleanliness is a store’s first impression and its trust. We watch tidiness and cleanliness by the same standard, so hygiene holds steady even at the busiest hours.
      jp: 清潔さは店舗の第一印象であり、信頼です。整理・清潔の状態を同じ基準で見守り、忙しい時間帯でも衛生水準がぶれないよう支援します。
  - id: s2
    tag:
      ko: 대기·회전
      en: Waits & turnover
      jp: 待ち時間・回転
    title:
      ko: 붐비는 순간을 미리 읽습니다
      en: Read the rush before it hits
      jp: 混み合う瞬間を先に読み取ります
    body:
      ko: 대기 줄이 길어지면 이탈로 이어집니다. 혼잡과 좌석 상태를 살펴 붐비는 흐름을 빠르게 파악하고, 응대와 회전을 준비할 수 있도록 돕습니다.
      en: Long lines turn into walk-aways. We watch crowding and seat status to read the rush early, so you can prepare service and turnover.
      jp: 待ち列が長くなると離脱につながります。混雑と座席の状態を見守って混み合う流れをすばやく把握し、接客と回転を準備できるよう支援します。
  - id: s3
    tag:
      ko: 발주
      en: Reordering
      jp: 発注
    title:
      ko: 발주 타이밍을 놓치지 않게
      en: Never miss the reorder window
      jp: 発注のタイミングを逃さないように
    body:
      ko: 재료 소진과 매대 상태를 참고해 발주가 필요한 시점을 가늠합니다. 모자라거나 남기는 일을 줄이고 운영 리듬을 안정적으로 유지하도록 돕습니다.
      en: We gauge when to reorder from ingredient depletion and shelf status. Less running short, less waste — keeping your operating rhythm steady.
      jp: 材料の消費と棚の状態を参考に、発注が必要な時点を見極めます。不足や余りを減らし、運営のリズムを安定して保てるよう支援します。
resultsLine:
  ko: 4인 테이블의 평균 이용이 1.1~1.8명임을 확인하고 2인 테이블과 1·2인 세트로 바꾼 매장은 이용객과 매출이 약 10% 늘었습니다.
  en: A restaurant that found its four-tops seating 1.1–1.8 guests on average — and switched to two-tops with one- and two-person sets — grew guests and revenue by about 10%.
  jp: 4人テーブルの平均利用が1.1〜1.8名だと確認し、2人テーブルと1・2人向けセットに切り替えた店舗は、利用客と売上が約10%伸びました。
resultsNote:
  ko: "* 고객사 사례 기준 예시 — 매장 조건에 따라 다를 수 있습니다."
  en: "* Illustrative, based on customer cases — results vary by store conditions."
  jp: "* 導入事例に基づく例 — 店舗条件により異なる場合があります。"
