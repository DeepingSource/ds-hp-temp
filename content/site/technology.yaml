  jp: どこでも、プライバシー・バイ・デザイン
complianceSub:
  ko: 원본은 저장하지 않고, 재식별은 불가능합니다. GDPR·CCPA·국내 개인정보보호법, 그리고 SOC2 인증까지 충족합니다.
  en: The original is never stored and re-identification is impossible. Compliant with GDPR, CCPA, Korea’s PIPA — and SOC 2 certified.
  jp: 原本は保存せず、再識別は不可能です。GDPR・CCPA・韓国の個人情報保護法、そしてSOC2認証まで満たします。
complianceDataSpec:
  ko: 영상은 메모리에서 즉시 익명화되고 저장되지 않습니다. 남는 건 개인정보 없는 통계값 — 좌표·성별대·연령대·시선·픽업 여부뿐입니다.
  en: Footage is anonymized in memory and never stored. What remains is personal-data-free statistics — coordinates, gender band, age band, gaze, and pickup only.
  jp: 映像はメモリ上で即座に匿名化され、保存されません。残るのは個人情報のない統計値 — 座標・性別帯・年齢帯・視線・ピックアップの有無だけです。
