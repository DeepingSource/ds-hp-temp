  en: The instant it arrives, identity is gone
  jp: 入ってきた瞬間、身元を消します
demoSub:
  ko: CCTV 영상이 들어오는 그 시점에 신원을 제거합니다. 여러 사람을 동시에 보호하고, 원본은 어디에도 남기지 않습니다.
  en: Identity is removed the moment CCTV footage comes in. Many people are protected at once, and the original is left nowhere.
  jp: CCTV映像が入ってくるその時点で身元を除去します。多数の人を同時に保護し、原本はどこにも残しません。
demoCaption:
  ko: 실제 출력입니다 — 합성 일러스트가 아니라, 제품이 만든 익명화 영상. 원본 → 익명화 → 익명 상태로 추적.
  en: This is real output — the product's own anonymized footage, not a synthetic illustration. Original → anonymized → tracked while anonymized.
  jp: 実際の出力です——合成イラストではなく、製品が生成した匿名化映像。原本 → 匿名化 → 匿名のまま追跡。
demoAria:
  ko: 원본·익명화·익명 추적 3분할로 보여주는 실제 익명화 출력 영상
  en: A three-panel clip showing real anonymization output — original, anonymized, and tracked while anonymized
  jp: 原本・匿名化・匿名追跡の3分割で示す実際の匿名化出力映像
