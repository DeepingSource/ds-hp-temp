dilemmaOld:
  ko:
    - 원본 영상에 얼굴과 신원이 그대로
    - 동의 없이 다수가 노출되는 구조
    - 저장될수록 규제 위험은 커진다
    - 결국 분석을 포기하거나, 원본을 떠안는다
  en:
    - Faces and identities remain in the raw footage
    - Dozens of people exposed without consent
    - The longer it’s stored, the greater the risk
    - You abandon the analysis, or carry the raw video
  jp:
    - 原本映像に顔と身元がそのまま残る
    - 同意なく多数の人がさらされる構造
    - 保存するほど、規制リスクは大きくなる
    - 結局、分析を断念するか、原本を抱え込む
dilemmaNew:
  ko:
    - 입력 시점에 신원을 지운다
    - 여러 사람을 동시에, 동의 없이도 보호
    - 원본은 남기지 않는다
    - 분석에 필요한 흐름은 원본 품질로 유지
  en:
    - Identity is removed at the moment of input
    - Many people protected at once, no consent required
    - The original is never kept
    - The movement that analysis needs stays at original quality
  jp:
    - 入力の時点で身元を消す
    - 同意がなくても、多数を同時に保護
    - 原本は残さない
    - 分析に必要な流れは原本品質で維持
dilemmaNote:
  ko: 타사는 원본을 분석한 뒤 삭제합니다. 딥핑소스는 익명화가 먼저 — 원본은 분석 전에 파기됩니다.
  en: Others analyze the original footage, then delete it. DeepingSource anonymizes first — the original is destroyed before analysis.
  jp: 他社は原本を分析してから削除します。ディーピングソースは匿名化が先 — 原本は分析の前に破棄されます。
