stack:
  - id: anonymizer
    tag:
      ko: ① Anonymizer
      en: ① Anonymizer
      jp: ① Anonymizer
    title:
      ko: 익명화
      en: Anonymization
      jp: 匿名化
    desc:
      ko: 비전 AI는 결국 사람을 봅니다. 입력 시점에 신원을 지우고, 원본은 남기지 않습니다. 모든 분석이 그 위에서 시작됩니다.
      en: Vision AI ultimately sees people. Identity is erased at the moment of input and the original is never kept. Every analysis begins on top of it.
      jp: ビジョンAIは結局、人を見ます。入力の時点で身元を消し、原本は残しません。すべての分析がその上で始まります。
  - id: spatial
    tag:
      ko: ② Spatial AI
      en: ② Spatial AI
      jp: ② Spatial AI
    title:
      ko: 공간 지능
      en: Spatial intelligence
      jp: 空間知能
    desc:
      ko: 누구인지가 아니라, 무엇을 어떻게. 검출·자세·재식별·군중 밀도를 하나의 영상에서 읽고, MTMC로 흩어진 카메라를 한 공간으로 정합해 카메라가 바뀌어도 한 사람으로 이어 추적합니다. 그 위에서 구역별 통과·체류를 히트맵으로, 대표 경로와 이상 동선까지 읽어냅니다.
      en: Not who, but what and how. Detection, pose, re-ID, crowd density from a single feed — and MTMC stitches scattered cameras into one space, tracking a person as one even across cameras. On top of it, pass-through and dwell become zone heatmaps, with the routes people actually take and abnormal paths.
      jp: 誰かではなく、何をどう。人物検出・姿勢推定・再識別・群衆密度を一つの映像から読み取り、MTMCで散らばったカメラを一つの空間に整合し、カメラが変わっても一人として追跡し続けます。その上で、エリア別の通過・滞在をヒートマップに、主要経路や異常な動線まで読み解きます。
  - id: agentic
    tag:
      ko: ③ Agentic AI
      en: ③ Agentic AI
      jp: ③ Agentic AI
    title:
      ko: 에이전트 AI
      en: Agentic AI
      jp: エージェントAI
    desc:
      ko: 범용 모델이 아니라, 공간 운영에 맞게 튜닝한 AI. 보는 데서 그치지 않고, 무엇을 바꿀지까지 판단합니다.
      en: Not a general-purpose model — AI tuned for operating space. It doesn’t stop at seeing; it judges what to change.
      jp: 汎用モデルではなく、空間運営に合わせてチューニングしたAI。見るだけで終わらず、何を変えるかまで判断します。
