eyebrow:
  ko: 익명화 공간 AI 플랫폼
  en: Anonymized Spatial AI platform
  jp: 匿名化空間AIプラットフォーム
heroTitle:
  ko: 모든 공간을, 완벽하게
  en: Perfect every space.
  jp: すべての空間を、完璧に。
heroSub:
  ko: 딥핑소스 saai suite — 이미 달린 CCTV 위에서 얼굴 없이, 어제를 분석하고 지금을 감지해 다음을 실행합니다.
  en: "DeepingSource saai suite — on the CCTV you already have, face-free: analyze yesterday, detect the now, act on next."
  jp: ディーピングソース saai suite — すでにあるCCTVの上で、顔なしに。昨日を分析し、今を検知し、次を実行します。
loopEyebrow:
  ko: 엔터프라이즈 · saai suite
  en: Enterprise · saai suite
  jp: エンタープライズ · saai suite
suiteTitle:
  ko: 엔터프라이즈는 saai suite 하나로 — 세 모드가 한 루프
  en: One suite for the enterprise — saai suite, three modes in one loop
  jp: エンタープライズは saai suite ひとつで — 3つのモードが、ひとつのループに
suiteSub:
  ko: insight가 어제를 분석하고, care가 지금을 감지하고, agent가 다음을 실행합니다. 세 모드가 하나의 익명화 루프로 도는 엔터프라이즈 패키지가 saai suite입니다.
  en: insight analyzes yesterday, care detects the now, agent acts on next. saai suite is the enterprise package where the three modes run as one anonymized loop.
  jp: insight が昨日を分析し、care が今を検知し、agent が次を実行します。3つのモードがひとつの匿名化ループとして回るエンタープライズパッケージが saai suite です。
ownersEyebrow:
  ko: 도메인 구현 · 사장님을 위한 B2C (별도 사이트)
  en: Domain implementations · for owners, B2C (separate sites)
  jp: ドメイン実装 · 店主向けB2C（別サイト）
categoryTitle:
  ko: 카테고리는 하나 — 익명화 공간 AI
  en: One category — Anonymized Spatial AI
  jp: カテゴリーはひとつ — 匿名化空間AI
categoryBody:
  ko: 영상은 입력 즉시 익명화되어 저장되지 않고, 공간의 흐름만 데이터로 남습니다.
  en: Footage is anonymized on input and never stored — only the flow of the space remains as data.
  jp: 映像は入力と同時に匿名化されて保存されず、空間の流れだけがデータとして残ります。
casesCta:
  ko: 도입 사례 보기
  en: See customer cases
  jp: 導入事例を見る
detail:
  ko: 자세히 보기
  en: Learn more
  jp: 詳しく見る
visit:
  ko: 바로가기
  en: Visit
  jp: 開く
seedLine:
  ko: SEAL · anonymizer · spatial AI · vision models — 모든 제품을 떠받치는 익명화 기술 기반.
  en: SEAL · anonymizer · spatial AI · vision models — the anonymization tech that powers every product.
  jp: SEAL · anonymizer · spatial AI · vision models — すべての製品を支える匿名化技術基盤。
seedCta:
  ko: 기술 보기
  en: See the tech
  jp: 技術を見る
cta:
  ko: 어떤 제품이 맞을지 상담하기
  en: Talk to us about the right product
  jp: どの製品が最適かご相談する
loop:
  - id: store-count
    desc:
      ko: 문 밖을 읽다 — 상권·통행량·유입률.
      en: Reads the footfall outside — trade area, footfall, capture rate.
      jp: 店の外を読む — 商圏・通行量・流入率。
  - id: store-insight
    desc:
      ko: 문 안을 읽다 — 동선·체류·전환. 어제, 그리고 왜.
      en: Reads inside — flow, dwell, conversion. Yesterday, and why.
      jp: 店の中を読む — 動線・滞在・転換。昨日と、その理由。
  - id: store-care
    desc:
      ko: 지금을 지키다 — 도난·위생·설비를 전 매장에서.
      en: Watches now — theft, hygiene, equipment, across every store.
      jp: いまを守る — 防損・衛生・設備を全店で。
  - id: store-agent
    desc:
      ko: 다음을 정하다 — 모든 추천과 발주를 하나의 엔진에서.
      en: Decides next — one engine for every recommendation and order.
      jp: 次を決める — すべての推奨と発注をひとつのエンジンで。
owners:
  - id: saai-store
    desc:
      ko: 카메라리스 사장님 suite — 발주부터 POP까지.
      en: Camera-less suite for store owners — ordering to POP.
      jp: 店長のためのカメラレススイート — 発注からPOPまで。
  - id: storecare-ai
    desc:
      ko: 한 매장을 위한 보안·이상 알림.
      en: Security and anomaly alerts for a single store.
      jp: 一店舗のためのセキュリティ・異常アラート。
