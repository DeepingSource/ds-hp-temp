live:
  - id: store-insight
    kicker:
      ko: 어제를 읽다
      en: Reads yesterday
      jp: 昨日を読む
    func:
      ko: 공간 분석 AI
      en: Spatial analytics AI
      jp: 空間分析AI
    desc:
      ko: POS가 못 센 것까지 — 어제 매장에서 무슨 일이 있었는지 데이터로 읽습니다.
      en: Beyond what the POS counted — it reads what happened in your store yesterday, as data.
      jp: POSが数え切れなかったものまで — 昨日の店舗で何が起きたかをデータで読み解きます。
    alt:
      ko: store insight 히트맵 — 고객 체류·동선 분석
      en: store insight heatmap — dwell and pathway analysis
      jp: store insight ヒートマップ — 滞在・動線分析
  - id: store-care
    kicker:
      ko: 지금을 알리다
      en: Flags the now
      jp: 今を知らせる
    func:
      ko: 이상 감지 AI
      en: Anomaly detection AI
      jp: 異常検知AI
    desc:
      ko: 24시간 매장을 대신 보는 눈 — 정작 필요한 순간만 골라 실시간으로 알립니다.
      en: A pair of eyes on your store 24/7 — only the moments that matter, flagged in real time.
      jp: 24時間、店舗を代わりに見守る目 — 本当に必要な瞬間だけをリアルタイムでお知らせ。
    alt:
      ko: store care — 매장 이상 상황 실시간 감지 (익명화)
      en: store care — real-time detection of store issues (anonymized)
      jp: store care — 店舗の異常をリアルタイム検知（匿名化）
  - id: store-agent
    kicker:
      ko: 다음을 실행하다
      en: Acts on next
      jp: 次を動かす
    func:
      ko: 운영 제안 AI
      en: Operations copilot AI
      jp: 運営提案AI
    desc:
      ko: 다음 한 수를 권고하고 발주까지 — 권고는 AI가, 결정은 사람이.
      en: Recommends the next move and turns it into orders — AI recommends, you decide.
      jp: 次の一手を提案し、発注まで — 提案はAI、決定は人。
    alt:
      ko: store agent — 다음 한 수 제안 화면
      en: store agent — next-move proposal screen
      jp: store agent — 次の一手の提案画面
tools:
  - id: store-count
    desc:
      ko: 카메라 한 대로, 상권과 유입을 매일.
      en: Trade area and footfall, daily, from one camera.
      jp: カメラ1台で、商圏と流入を毎日。
  - id: ai-pop
    desc:
      ko: 이 매장에 맞춘 POP·시즌 콘텐츠를 1분 만에.
      en: On-brand POP and seasonal content for this store in a minute.
      jp: この店舗に合わせたPOP・季節コンテンツを1分で。
  - id: trend-fit
    desc:
      ko: 트렌드 적합도로 다음 발주를 돕습니다.
      en: Trend-fit scoring to guide your next order.
      jp: トレンド適合度で次の発注をサポート。
