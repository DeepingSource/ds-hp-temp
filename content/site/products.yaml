seedLine:
  ko: SEAL · anonymizer · spatial AI · vision models — 모든 제품을 떠받치는 익명화 기술 기반.
  en: SEAL · anonymizer · spatial AI · vision models — the anonymization tech that powers every product.
  jp: SEAL · anonymizer · spatial AI · vision models — すべての製品を支える匿名化技術基盤。
seedCta:
  ko: 기술 보기
  en: See the tech
  jp: 技術を見る
cta:
  ko: 어떤 제품이 맞을지 상담하기
  en: Talk to us about the right product
  jp: どの製品が最適かご相談する
loop:
  - id: store-count
    desc:
      ko: 문 밖을 읽다 — 상권·통행량·유입률.
      en: Reads the footfall outside — trade area, footfall, inflow rate.
      jp: 店の外を読む — 商圏・通行量・流入率。
  - id: store-insight
    desc:
      ko: 문 안을 읽다 — 동선·체류·전환. 어제, 그리고 왜.
      en: Reads inside — flow, dwell, conversion. Yesterday, and why.
      jp: 店の中を読む — 動線・滞在・転換。昨日と、その理由。
  - id: store-care
    desc:
      ko: 지금을 지키다 — 도난·위생·설비를 전 매장에서.
      en: Watches now — theft, hygiene, equipment, across every store.
      jp: いまを守る — 防損・衛生・設備を全店で。
  - id: store-agent
    desc:
      ko: 다음을 정하다 — 모든 추천과 발주를 하나의 엔진에서.
      en: Decides next — one engine for every recommendation and order.
      jp: 次を決める — すべての推奨と発注をひとつのエンジンで。
owners:
  - id: saai-store
    desc:
      ko: 카메라리스 사장님 suite — 발주부터 POP까지.
      en: Camera-less suite for store owners — ordering to POP.
      jp: 店長のためのカメラレススイート — 発注からPOPまで。
  - id: storecare-ai
    desc:
      ko: 한 매장을 위한 보안·이상 알림.
      en: Security and anomaly alerts for a single store.
      jp: 一店舗のためのセキュリティ・異常アラート。
