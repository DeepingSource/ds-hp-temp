badge:
  ko: 현장 맞춤형 솔루션 가이드
  en: Field-tailored solutions
  jp: 現場カスタマイズソリューション
heroTitle:
  ko:
    - 당신의 공간은,
    - 어디인가요?
  en:
    - Where is
    - your physical space?
  jp:
    - あなたの空間は、
    - どこですか?
heroSub:
  ko: |-
    편의점부터 대형 유통·물류센터까지
    당신 같은 공간에서 무엇이 어떻게 달라졌는지 확인하세요.
  en: |-
    From convenience stores to logistics centers
    see how physical spaces like yours transformed.
  jp: |-
    コンビニから大型流通・物流センターまで
    あなたと同じ空間で何がどう変わったか確認してください。
viewSolution:
  ko: 솔루션 보기
  en: View solution
  jp: ソリューションを見る
ctaEyebrow:
  ko: 무료 상담
  en: Free consultation
  jp: 無料相談
ctaTitle:
  ko:
    - 우리 매장의 문제도
    - 해결할 수 있을까요?
  en:
    - Could it solve
    - your store’s problem too?
  jp:
    - あなたの店舗の課題も
    - 解決できるでしょうか?
ctaSub:
  ko:
    - 업종과 현황을 알려주시면
    - 맞춤 해결 방안을 안내해 드립니다.
  en:
    - Tell us your industry and situation, and we’ll guide you
    - to a tailored solution — free of charge.
  jp:
    - 業種と状況をお知らせいただければ、最適な解決策を
    - 無料でご案内します。
ctaPrimary:
  ko: 무료 상담 신청
  en: Request a free consultation
  jp: 無料相談を申し込む
ctaSecondary:
  ko: 도입 사례 보기
  en: View case studies
  jp: 導入事例を見る
