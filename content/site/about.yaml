story:
  storyHeading:
    ko: 익명화에서, 물리 세계로
    en: From anonymization to the physical world
    jp: 匿名化から、物理世界へ
  storySub:
    ko: 개인정보 규제가 강해지던 2018년, 우리는 그 딜레마를 정면으로 풀기로 했습니다 — 촬영하는 그 순간 신원을 지우되, 분석에 필요한 특징은 남기는 '익명화된 AI'로. 익명화에서 출발해 비전 AI로 공간을 읽다가 사람이 일하고 사는 물리 세계를 만났고, 지금은 그 공간을 읽고 지키고 운영까지 잇습니다.
    en: In 2018, as privacy regulation tightened, we chose to face that dilemma head-on — with 'anonymized AI' that erases identity at the moment of capture while keeping the features analysis needs. Starting from anonymization, we read space with vision AI and met the physical world where people work and live; today we read that space, safeguard it, and carry it through to operations.
    jp: 個人情報規制が強まる2018年、私たちはその葛藤を正面から解くことにしました — 撮影するその瞬間に身元を消しつつ、分析に必要な特徴は残す「匿名化されたAI」で。匿名化から出発し、ビジョンAIで空間を読むうちに人が働き暮らす物理世界に出会い、いまはその空間を読み、守り、運営までつなぎます。
  namingHeading:
    ko: 이름에 대하여 — 딥핑소스
    en: About the name — Deeping Source
    jp: 名前について — Deeping Source
  namingBody:
    ko: >-
      딥핑소스(Deeping Source)는 딥러닝(Deep Learning)과 소스 코드(Source Code)의 결합입니다.
      모든 것의 원동력이 되는 소스, 곧 데이터를 심층(deep)까지 파고든다는 뜻이죠. 창업자는 인텔에
      합류한 첫 벤처(올라웍스) 이후 GDPR·CCPA가 AI의 판을 바꾸는 것을 지켜보며, 책임 있는 데이터가
      AI의 미래임을 확신하고 딥핑소스를 시작했습니다. (참고로, 디핑소스(dipping sauce)가 아닙니다.)
    en: >-
      Deeping Source joins Deep Learning and Source Code — going deep into the source
      that powers everything: data. After the founder's first venture (Olaworks) joined
      Intel, watching GDPR and CCPA reshape AI convinced them that responsible data is
      AI's future, and Deeping Source began. (It's Deeping Source, not dipping sauce.)
    jp: >-
      Deeping Source は Deep Learning と Source Code の組み合わせ。あらゆるものの原動力となる「ソース」＝データを深く（deep）掘り下げるという意味です。創業者は最初のベンチャー（Olaworks）がインテルに加わった後、GDPR・CCPAがAIの前提を変えるのを目の当たりにし、「責任あるデータ」こそAIの未来だと確信してDeeping Sourceを始めました。（dipping sauce ではありません。）
