vm:
  missionStatement:
    ko: |-
      온라인은 20년간 최적화됐습니다.
      현장은, 거의 그대로입니다.
    en: |-
      Online was optimized for 20 years.
      Physical space remained almost untouched.
    jp: |-
      オンラインは20年間最適化されました。
      現場は、ほとんどそのままです。
  missionStatementSub:
    ko: |-
      딥핑소스는, 그 현장을
      다시 만듭니다.
    en: |-
      DeepingSource is here to
      reinvent it.
    jp: |-
      ディーピングソースは、
      その現場をつくりなおす。
  # vision·mission은 아직 미렌더 — Stage 6에서 실제 렌더 연결 예정(1-2 지침, AB A3 완결은 Stage 6-2)
  vision:
    ko: 당신의 공간에서 시작해, 모든 공간으로.
    en: Starting from your space — to every space.
    jp: あなたの空間から始めて、すべての空間へ。
  mission:
    ko: 측정할 수 있으면, 나아질 수 있습니다. 온라인을 바꾼 그 힘을, 이제 물리 세계로.
    en: If you can measure it, you can improve it. We bring the force that remade online to the physical world.
    jp: 測定できれば、よくできます。オンラインを変えたその力を、いま物理世界へ。
story:
  storyHeading:
    ko: 익명화에서, 물리 세계로
    en: From anonymization to the physical world
    jp: 匿名化から、物理世界へ
  storySub:
    ko: 개인정보 규제가 강해지던 2018년, 우리는 딜레마를 정면으로 풀기로 했습니다. 촬영하는 순간 신원을 지우되, 분석에 필요한 특징은 남긴다 — '익명화 AI'입니다. 그 토대 위에서 지금은 공간을 읽고, 지키고, 운영까지 잇습니다.
    en: In 2018, as privacy regulation tightened, we chose to face the dilemma head-on. Erase identity the moment footage is captured, keep only the features analysis needs — that is 'anonymized AI'. On that foundation, we now read, safeguard, and run physical spaces.
    jp: 個人情報規制が強まる2018年、私たちはそのジレンマに正面から向き合うことにしました。撮影した瞬間に身元を消し、分析に必要な特徴だけを残す — それが「匿名化AI」です。その土台の上で、いまは空間を読み、守り、運営までつなぎます。
  namingHeading:
    ko: 이름에 대하여 — 딥핑소스
    en: About the name — Deeping Source
    jp: 名前について — Deeping Source
  namingBody:
    ko: 딥핑소스(Deeping Source)는 딥러닝(Deep Learning)과 소스 코드(Source Code)의 결합입니다. (참고로, 디핑소스(dipping sauce)가 아닙니다.)
    en: Deeping Source joins Deep Learning and Source Code. (It's Deeping Source, not dipping sauce.)
    jp: Deeping Source は Deep Learning と Source Code の組み合わせです。（dipping sauce ではありません。）
  # B5 읽기 레이어 — 창업자 배경은 펼침으로. 실명 연결(리더십과 호응, AB Beat 2)
  namingDetail:
    ko: 모든 것의 원동력이 되는 소스, 곧 데이터를 심층(deep)까지 파고든다는 뜻입니다. 창업자 김태훈 대표는 인텔에 합류한 첫 벤처(올라웍스) 이후 GDPR·CCPA가 AI의 판을 바꾸는 것을 지켜보며, 책임 있는 데이터가 AI의 미래임을 확신하고 딥핑소스를 시작했습니다.
    en: It means going deep into the source that powers everything — data. After his first venture (Olaworks) joined Intel, founder Pete Kim watched GDPR and CCPA reshape AI, became convinced that responsible data is AI's future, and started Deeping Source.
    jp: あらゆるものの原動力となる「ソース」＝データを深く（deep）掘り下げるという意味です。創業者のPete Kim（キム・テフン）代表は、最初のベンチャー（Olaworks）がインテルに加わった後、GDPR・CCPAがAIの前提を変えるのを目の当たりにし、「責任あるデータ」こそAIの未来だと確信してDeeping Sourceを始めました。
