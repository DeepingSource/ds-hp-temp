method:
  methodEyebrow:
    ko: How we work
    en: How we work
    jp: How we work
  methodHeading:
    ko: 익명화 위에 공간 지능, 그 위에 에이전트 AI
    en: Spatial AI on anonymization, agents on top
    jp: 匿名化の上に空間知能、その上にエージェントAI
  methodIntro:
    ko: 비전 AI는 결국 사람을 봅니다. 우리는 익명화에서 시작해, 세 개의 축으로 공간을 읽고 운영합니다.
    en: Vision AI ultimately looks at people. We start with anonymization, then read and run the space across three layers.
    jp: ビジョンAIは結局、人を見ます。私たちは匿名化から始め、三つの軸で空間を読み、運営します。
  methodSteps:
    - id: anonymizer
      term:
        ko: ① 익명화 · Anonymizer
        en: ① Anonymizer
        jp: ① 匿名化 · Anonymizer
      promise:
        ko: 입력 시점에 신원을 지웁니다. 누구인지는 남기지 않고, 무엇을 어떻게만 봅니다.
        en: Identity is erased at the moment of input. Never who — only what and how.
        jp: 入力の時点で身元を消します。誰かではなく、何をどうだけを見ます。
    - id: spatial
      term:
        ko: ② 공간 지능 · Spatial AI
        en: ② Spatial AI
        jp: ② 空間知能 · Spatial AI
      promise:
        ko: 머문 곳, 흐른 길, 닿은 손길까지 — 비전 모델로 공간을 좌표 위에 읽어냅니다.
        en: Where people pause, how they flow, what they touch — vision models map the space onto coordinates.
        jp: 滞留した場所、流れた道、触れた手まで — ビジョンモデルが空間を座標の上に読み解きます。
    - id: agentic
      term:
        ko: ③ 에이전트 AI · Agentic AI
        en: ③ Agentic AI
        jp: ③ エージェントAI · Agentic AI
      promise:
        ko: 보는 데서 그치지 않고 다음 한 수를 권합니다. 권고는 AI가, 결정은 사람이.
        en: It does not stop at seeing. It recommends the next move — AI advises, people decide.
        jp: 見るだけで終わらず、次の一手を提案します。推奨はAI、決定は人。
