method:
  methodEyebrow:
    ko: 3-TIER ARCHITECTURE · 3층 구조
    en: 3-TIER ARCHITECTURE
    jp: 3-TIER ARCHITECTURE · 3層構造
  methodHeading:
    ko: 익명화 위에 공간 지능, 그 위에 에이전트 AI
    en: Agentic AI on Spatial AI, built on Anonymization
    jp: 匿名化の上に空間知能、その上にエージェントAI
  methodIntro:
    ko: 세 개의 층이 바닥부터 탄탄하게 쌓여, 안전하고 강력한 오프라인 인텔리전스를 완성합니다.
    en: Three layers stacked from the ground up, completing safe and powerful offline intelligence.
    jp: 3つの層が土台から堅固に積み重なり、安全で強力なオフラインインテリジェンスを完成させます。
  methodSteps:
    - id: anonymizer
      title:
        ko: 익명화 파운데이션 (토대)
        en: Anonymization Foundation (Base)
        jp: 匿名化ファウンデーション (土台)
      desc:
        ko: 얼굴과 신원은 입력 시점에 원천 삭제되어 규제 리스크 없이 공간 전체를 분석합니다.
        en: Identities are erased permanently at capture — zero compliance risk across the space.
        jp: 顔と身元は入力時点で消去され、規制リスクなく空間全体を分析します。
      tag:
        ko: 신원 원천 삭제 · SEAL
        en: Instant Erasure · SEAL
        jp: 身元消去 · SEAL
    - id: spatial
      title:
        ko: 공간 지능 (분석)
        en: Spatial Intelligence (Analyze)
        jp: 空間知能 (分析)
      desc:
        ko: CCTV를 하나의 공간 좌표로 묶어 사람과 사물의 동선·체류·밀도를 정밀하게 읽습니다.
        en: Binds CCTVs into spatial coordinates to read traffic, dwell, and density.
        jp: CCTVをひとつの空間座標に統合し、人やモノの動線・滞在・密度を精密に読み取ります。
      tag:
        ko: 좌표 정합 · 흐름 인지
        en: Coordinate Alignment · Flow Sensing
        jp: 座標整合 · 流れの認識
    - id: agentic
      title:
        ko: 에이전트 AI (실행)
        en: Agentic AI (Act)
        jp: エージェントAI (実行)
      desc:
        ko: 오늘 현장에서 무엇을 바꿀지 짚어주고 실시간 가이드를 안내합니다 (결정은 사람).
        en: Points to what to change on the floor with live staff guides (People decide).
        jp: 今日現場で何を改善すべきかを示し、リアルタイムガイドを案内します (決定は人)。
      tag:
        ko: 자율 제안 · 행동 가이드
        en: Proactive Advice · Staff Guide
        jp: 自律提案 · 行動ガイド
