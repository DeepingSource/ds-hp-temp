# method — About Beat 3(SpatialStackDiagram)의 SOT. Stage 1-2에서 화면 카피(구 stackCopy
# 하드코딩)를 그대로 이관해 역전(화면 diff 0) — 카피 갱신은 Stage 6-3(AB Beat 3 수정안) 몫.
method:
  methodEyebrow:
    ko: 3층 구조
    en: 3-Tier Structure
    jp: 3層構造
  methodHeading:
    ko: 익명화 위에 공간 지능, 그 위에 에이전트 AI
    en: Agentic AI on Spatial AI, built on Anonymization
    jp: 匿名化の上に空間知能、その上にエージェントAI
  methodIntro:
    ko: 아래층이 위층을 떠받칩니다. 익명화 없이는 아무것도 시작하지 않습니다.
    en: Each layer rests on the one below. Nothing starts without anonymization.
    jp: 下の層が上の層を支えます。匿名化なしには、何も始めません。
  methodSteps:
    - id: anonymizer
      title:
        ko: 익명화 파운데이션 (토대)
        en: Anonymization Foundation (Base)
        jp: 匿名化ファウンデーション (土台)
      desc:
        ko: 얼굴과 신원은 들어오는 순간 지웁니다. 원본은 남지 않습니다.
        en: Faces and identities are erased the moment they enter. No originals remain.
        jp: 顔と身元は、入ってきた瞬間に消します。原本は残りません。
      tag:
        ko: 신원 원천 삭제 · SEAL
        en: Instant Erasure · SEAL
        jp: 身元消去 · SEAL
    - id: spatial
      title:
        ko: 공간 지능 (분석)
        en: Spatial Intelligence (Analyze)
        jp: 空間知能 (分析)
      desc:
        ko: CCTV를 하나의 공간 좌표로 묶어 사람과 사물의 동선·체류·밀도를 정밀하게 읽습니다.
        en: Binds CCTVs into spatial coordinates to read traffic, dwell, and density.
        jp: CCTVをひとつの空間座標に統合し、人やモノの動線・滞在・密度を精密に読み取ります。
      tag:
        ko: 좌표 정합 · 흐름 인지
        en: Coordinate Alignment · Flow Sensing
        jp: 座標整合 · 流れの認識
    - id: agentic
      title:
        ko: 에이전트 AI (실행)
        en: Agentic AI (Act)
        jp: エージェントAI (実行)
      desc:
        ko: 오늘 무엇을 바꿀지 짚어 줍니다. 권고는 AI가, 결정은 사람이 합니다.
        en: Points to what to change today. AI recommends; people decide.
        jp: 今日何を変えるべきかを示します。推奨はAIが、決定は人が行います。
      tag:
        ko: 자율 제안 · 행동 가이드
        en: Proactive Advice · Staff Guide
        jp: 自律提案 · 行動ガイド
cta:
  ctaHeading:
    ko: |-
      데이터센터가 아니라,
      사람이 사는 세상을 만듭니다.
    en: |-
      Not a world in a data center.
      We build the world people live in.
    jp: |-
      データセンターの中ではなく、
      人が暮らす世界をつくります。
  ctaSub:
    ko: 도입 문의부터 협업 제안까지, 무엇이든 편하게 연락 주세요. 영업일 1–2일 안에 회신합니다.
    en: From adoption inquiries to partnership proposals, reach out anytime. We reply within 1–2 business days.
    jp: 導入のお問い合わせから協業のご提案まで、お気軽にご連絡ください。1〜2営業日以内にご返信します。
  ctaButton:
    ko: 문의하기
    en: Get in touch
    jp: お問い合わせ
