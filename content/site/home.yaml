masterCompany:
  ko: 모든 매장을, 한 매장처럼
  en: Every store, as if it were one.
  jp: すべての店舗を、一つの店のように。
masterOwner:
  ko: 우리 매장이 대표 매장처럼
  en: Our store, like the best.
  jp: 私たちの店が、代表店のように。
heroSub:
  ko: "CCTV 화면에 보이는 방문객 동선, 정체 구역, 재고와 안전 위험까지. SAAI는 얼굴을 지운 카메라로 매장의 모든 순간을 읽고, 오늘 현장에서 바로 실행할 한 가지 작업으로 정리해 드립니다."
  en: "Your space signals every moment — the paths people take, where they linger, the shelf they stop at. Only an AI that receives those signals gives your answer, not a generic one."
  jp: "空間は絶えず信号を発します — 人の動線、とどまる場所、足を止めた棚。その信号を受け取ってこそ、AIは一般論ではなくあなたの答えを返します。"
ctaPrimary:
  ko: 도입 상담
  en: Talk to us
  jp: 導入のご相談
ctaSecondary:
  ko: 제품 보기
  en: Explore products
  jp: 製品を見る
