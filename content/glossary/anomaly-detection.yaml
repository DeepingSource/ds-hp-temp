slug: anomaly-detection
order: 6
category: ai
englishTitle: Anomaly Detection
title:
  ko: 이상 감지 (Anomaly Detection)
  en: Anomaly Detection
  jp: 異常検知 (Anomaly Detection)
tagline:
  ko: AI가 정상 패턴을 학습해 비정상 상황을 자동으로 탐지하는 기술
  en: AI that learns normal patterns to automatically flag abnormal situations
  jp: AIが正常なパターンを学習し、異常な状況を自動で検知する技術です
definition:
  ko: 이상 감지(Anomaly Detection)란 AI가 정상적인 패턴을 학습한 후, 그 패턴에서 벗어나는 비정상적인 상황을 실시간으로 탐지해 알림을 발생시키는 기술입니다. 매장 환경에서는 무인 시간대 침입, 장시간 배회, 쓰러짐, 기물 파손 등의 이상 행동을 감지하는 데 활용됩니다.
  en: Anomaly detection is a technology in which AI learns normal patterns and then detects, in real time, abnormal situations that deviate from those patterns, raising alerts. In a store environment, it is used to detect anomalous behavior such as intrusion during unattended hours, prolonged loitering, falls, and vandalism.
  jp: 異常検知（Anomaly Detection）とは、AIが正常なパターンを学習したうえで、そのパターンから外れる異常な状況をリアルタイムで検知し、アラートを発する技術です。店舗環境では、無人時間帯の侵入、長時間の徘徊、転倒、器物破損などの異常行動の検知に活用されます。
relatedTerms:
