slug: footfall-analysis
order: 9
category: analytics
englishTitle: Footfall Analysis
title:
  ko: 방문객 분석 (Footfall Analysis)
  en: Footfall Analysis
  jp: 来店客分析 (Footfall Analysis)
tagline:
  ko: 시간대·요일별 방문객 흐름을 정밀하게 측정하는 기초 분석
  en: Foundational analysis that precisely measures visitor flow by hour and day
  jp: 時間帯・曜日ごとの来店客の流れを精密に測定する基礎分析です
definition:
  ko: 방문객 분석(Footfall Analysis)이란 매장을 방문하는 고객의 수와 시간 패턴을 자동으로 측정하는 분석입니다. 입장 인원, 시간대별 유입량, 피크 타임, 방문 빈도 등을 파악해 인력 배치, 재고 보충, 프로모션 타이밍을 최적화하는 기반 데이터를 제공합니다.
  en: Footfall analysis automatically measures the number of customers visiting a store and their timing patterns. By capturing entries, inflow by time of day, peak times, and visit frequency, it provides the foundational data to optimize staffing, restocking, and promotion timing.
  jp: 来店客分析（Footfall Analysis）とは、店舗を訪れる顧客の数と時間パターンを自動で測定する分析です。入店人数、時間帯別の流入量、ピークタイム、訪問頻度などを把握し、人員配置・在庫補充・プロモーションのタイミングを最適化する基礎データを提供します。
relatedTerms:
  - purchase-conversion-rate
  - dwell-time
