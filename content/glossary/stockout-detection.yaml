slug: stockout-detection
order: 11
category: operations
englishTitle: Stockout Detection
title:
  ko: 결품 감지 (Stockout Detection)
  en: Stockout Detection
  jp: 欠品検知 (Stockout Detection)
tagline:
  ko: 진열대 빈 공간을 AI가 자동으로 감지해 실시간 알림 발송
  en: AI automatically detects empty shelf space and sends real-time alerts
  jp: AIが陳列棚の空きスペースを自動検知し、リアルタイムで通知します
definition:
  ko: 결품 감지(Stockout Detection)란 매장 진열대에서 상품이 소진되어 빈 공간이 발생하는 순간을 AI 카메라가 자동으로 감지하고 담당자에게 알림을 전송하는 기능입니다. POS 데이터로는 알 수 없는 "팔리지 못한 손실"을 방지합니다.
  en: Stockout detection is a capability in which an AI camera automatically detects the moment a product sells out and an empty space appears on a store shelf, and sends an alert to the person in charge. It prevents the “unsellable loss” that POS data cannot reveal.
  jp: 欠品検知（Stockout Detection）とは、店舗の陳列棚で商品が売り切れて空きスペースが生じた瞬間をAIカメラが自動で検知し、担当者へ通知する機能です。POSデータでは分からない「売れなかった損失」を防ぎます。
relatedTerms:
  - anomaly-detection
  - vmd-optimization
  - footfall-analysis
relatedIndustries:
