slug: anonymized-cctv
order: 2
category: ai
englishTitle: Anonymized CCTV Analytics
title:
  ko: 익명화 CCTV 분석
  en: Anonymized CCTV Analytics
  jp: 匿名化CCTV分析
tagline:
  ko: 얼굴·개인정보 없이 행동 패턴만 추출하는 AI 분석 기술
  en: AI that extracts only behavioral patterns, without faces or personal data
  jp: 顔や個人情報を扱わず、行動パターンのみを抽出するAI分析技術です
definition:
  ko: 익명화 CCTV 분석이란 CCTV 영상에서 개인을 식별할 수 있는 정보(얼굴, 이름, 번호판 등)를 AI가 자동으로 제거하거나 처리하지 않고, 위치·이동·체류 등 행동 패턴 데이터만 추출하는 기술입니다. 개인정보보호법을 준수하면서 매장 분석에 필요한 인사이트를 확보할 수 있습니다.
  en: Anonymized CCTV analytics is a technology in which AI extracts only behavioral data — such as location, movement, and dwell — from CCTV footage, without capturing or processing personally identifiable information like faces, names, or license plates. It secures the insights needed for store analysis while remaining compliant with privacy regulations.
  jp: 匿名化CCTV分析とは、CCTV映像から顔・氏名・ナンバープレートなどの個人を特定できる情報を取得・処理せず、位置・移動・滞在といった行動パターンのデータのみを抽出する技術です。個人情報保護法を遵守しながら、店舗分析に必要なインサイトを確保できます。
