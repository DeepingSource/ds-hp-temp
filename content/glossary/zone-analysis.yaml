slug: zone-analysis
order: 8
category: analytics
englishTitle: Zone Analysis
title:
  ko: 구역별 분석 (Zone Analysis)
  en: Zone Analysis
  jp: ゾーン別分析 (Zone Analysis)
tagline:
  ko: 매장을 구역으로 나눠 어떤 공간이 매출에 기여하는지 측정
  en: Dividing a store into zones to measure which spaces drive sales
  jp: 店舗をゾーンに分け、どの空間が売上に貢献しているかを測定します
definition:
  ko: 구역별 분석(Zone Analysis)이란 매장을 여러 구역으로 구분하고, 각 구역의 방문률, 체류 시간, 전환율을 개별적으로 측정·비교하는 분석 방법입니다. 어떤 구역이 고객의 주목을 받고 어떤 구역이 사각지대인지를 파악해 레이아웃과 진열을 최적화합니다.
  en: Zone analysis is an analytical method that divides a store into multiple zones and measures and compares each zone’s visit rate, dwell time, and conversion rate individually. By identifying which zones draw customer attention and which are blind spots, it optimizes layout and merchandising.
  jp: ゾーン別分析（Zone Analysis）とは、店舗を複数のゾーンに分け、各ゾーンの訪問率・滞在時間・転換率を個別に測定・比較する分析手法です。どのゾーンが顧客の注目を集め、どのゾーンが死角になっているかを把握し、レイアウトと陳列を最適化します。
relatedTerms:
  - store-heatmap
  - dwell-time
  - purchase-conversion-rate
relatedIndustries:
  - drugstore
  - mart
  - exhibition
saaiUsage: SAAI store insight의 구역별 분석 기능은 최대 20개 가상 구역을 동시에 모니터링합니다. 각 구역의 방문객 수, 평균 체류 시간, 재방문율을 시간대별로 집계하며, 구역 간 이동 패턴(어느 구역에서 어느 구역으로 이동하는지)도 분석합니다.
metaDescription: 구역별 분석이란? 매장을 공간으로 나눠 방문률·체류·전환율을 측정하는 리테일 분석법. 사각지대 파악과 레이아웃 최적화에 활용하는 방법을 알아보세요.
body:
  - heading: 구역별 분석이 드러내는 것들
    paragraphs:
      - 동일한 매장 면적이지만 모든 구역이 동등하게 활용되지는 않습니다. 입구 쪽과 안쪽, 왼쪽 동선과 오른쪽 동선은 방문 빈도와 체류 패턴이 다릅니다. 구역별 분석은 이 차이를 정량화합니다.
      - 예를 들어 드럭스토어에서 고마진 스킨케어 구역의 방문률이 30%에 불과하다면, 해당 구역으로의 동선을 유도하는 사인물이나 체험 프로모션을 추가할 수 있습니다. 분석 없이는 "왜 안 팔리는지"를 직관으로만 판단할 수밖에 없습니다.
  - heading: 구역 설정 기준
    paragraphs:
      - 구역은 물리적 매대 배치, 상품 카테고리, 또는 분석 목적에 따라 자유롭게 설정합니다. SAAI에서는 카메라 영상 위에 가상 구역(Virtual Zone)을 드래그로 그려 즉시 분석을 시작할 수 있습니다.
      - 시간이 지남에 따라 구역 설정을 변경하거나 새로운 프로모션 구역을 추가해 진열 개편 전후 효과를 비교 측정할 수 있습니다.
