slug: pos-data-limitations
order: 18
category: analytics
englishTitle: Limitations of POS Data
title:
  ko: POS 데이터의 한계
  en: Limitations of POS Data
  jp: POSデータの限界
tagline:
  ko: 결제된 것만 아는 POS, 놓치는 데이터가 더 많다
  en: POS knows only what was paid for — far more data goes unrecorded
  jp: 決済されたものしか分からないPOSは、取りこぼすデータの方が多いのです
definition:
  ko: POS(Point of Sale) 데이터는 실제로 결제가 완료된 거래 기록만을 포함합니다. 방문했지만 구매하지 않은 고객, 집었다가 내려놓은 상품, 진열대가 비어 팔리지 못한 손실은 POS에 기록되지 않습니다. 이 "보이지 않는 데이터"가 매장 개선의 핵심입니다.
  en: POS (Point of Sale) data includes only records of transactions that were actually completed. Customers who visited but did not buy, products picked up and put back down, and losses from shelves that sat empty and unsold are never recorded in POS. This “invisible data” is the key to store improvement.
  jp: POS（Point of Sale）データには、実際に決済が完了した取引記録のみが含まれます。来店したが購入しなかった顧客、手に取って戻した商品、陳列棚が空いて売れなかった損失は、POSには記録されません。この「見えないデータ」こそが店舗改善の鍵です。
relatedTerms:
  - purchase-conversion-rate
  - stockout-detection
