slug: purchase-conversion-rate
order: 4
category: retail
englishTitle: Purchase Conversion Rate
title:
  ko: 구매 전환율
  en: Purchase Conversion Rate
  jp: 購買転換率
tagline:
  ko: 방문한 고객 중 실제로 구매한 비율, 매장 효율의 핵심 지표
  en: The share of visitors who actually buy — a core measure of store efficiency
  jp: 来店した顧客のうち実際に購入した割合で、店舗効率の中核指標です
definition:
  ko: 구매 전환율(Purchase Conversion Rate)이란 매장에 입장한 전체 방문객 중 실제로 구매 행동(결제)으로 이어진 고객의 비율입니다. 방문 100명 중 30명이 구매했다면 전환율은 30%입니다. 매장의 진열, 동선, 상품 구성, 직원 서비스의 종합적 효율을 나타내는 지표입니다.
  en: Purchase conversion rate is the share of all visitors entering a store who actually complete a purchase. If 30 of every 100 visitors buy, the conversion rate is 30%. It is a metric that reflects the combined efficiency of a store’s merchandising, traffic flow, product mix, and staff service.
  jp: 購買転換率（Purchase Conversion Rate）とは、来店したすべての顧客のうち、実際に購買（決済）に至った顧客の割合です。来店100名のうち30名が購入すれば、転換率は30%となります。店舗の陳列・動線・商品構成・接客サービスの総合的な効率を示す指標です。
relatedTerms:
  - store-heatmap
  - dwell-time
  - footfall-analysis
  - pos-data-limitations
relatedIndustries:
  - convenience
