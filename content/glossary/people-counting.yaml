slug: people-counting
order: 28
category: analytics
englishTitle: People Counting
title:
  ko: 피플 카운팅
  en: People Counting
  jp: ピープルカウンティング
tagline:
  ko: 통행과 입장을 세는 것 — 모든 매장 데이터의 출발점
  en: Counting footfall and entries — where every store metric begins
  jp: 通行と入店を数えること — あらゆる店舗データの出発点です
definition:
  ko: 피플 카운팅(People Counting)이란 특정 지점이나 선을 지나는 사람 수를 자동으로 세는 기술입니다. 매장 앞 유동인구, 출입구 입장객, 구역별 방문객이 대표적인 측정 대상으로, 유입률·전환율·체류 같은 상위 지표가 모두 이 카운트를 분모나 분자로 삼습니다.
  en: People counting automatically counts how many people cross a point or line — footfall outside, entries at the door, visitors per zone. Higher-level metrics like capture rate, conversion, and dwell all use these counts as numerator or denominator.
  jp: ピープルカウンティング（People Counting）とは、特定の地点やラインを通過する人数を自動で数える技術です。店頭の通行量、出入口の入店数、エリア別の来訪者数が代表的な測定対象で、流入率・転換率・滞在といった上位指標はすべてこのカウントを分母・分子にしています。
relatedTerms:
  - footfall-analysis
  - capture-rate
  - crowd-density-analysis
  - zone-analysis
relatedIndustries:
  - convenience
  - exhibition
  - cafe
saaiUsage: store count는 카메라 한 대로 화면 위에 그은 기준선을 넘는 사람을 셉니다 — 통행 선과 유입 선을 나눠 유동인구와 입장객을 동시에 측정하고, 시간대·성별·연령대별로 집계합니다. 검증 현장 기준 정확도 95~96%(사람이 직접 센 결과 대비), 영상은 저장하지 않고 통계값만 남습니다.
metaDescription: 피플 카운팅이란? 통행·입장·구역 방문을 자동으로 세는 기술. 측정 방식별 차이와 유입률·전환율 분석의 기초가 되는 이유를 설명합니다.
body:
  - heading: 세는 방식의 차이
    paragraphs:
      - 적외선 센서는 싸지만 겹쳐 지나가면 놓치고, 방향과 속성을 모릅니다. Wi-Fi 신호 기반은 기기 보급률과 신호 설정에 좌우됩니다. 비전 기반 카운팅은 화면에서 사람을 직접 인식하므로 방향·시간대·연령대·성별 같은 속성까지 함께 셀 수 있습니다.
      - 정확도는 "사람이 직접 센 결과와 얼마나 일치하는가"로 검증합니다. 도입 전 검증 기준과 측정 시점이 명시된 수치인지 확인하는 것이 좋습니다.
  - heading: 카운트가 기초 체력인 이유
    paragraphs:
      - 유입률은 입장을 통행으로 나눈 값이고, 전환율은 결제를 방문으로 나눈 값입니다. 분모가 되는 카운트가 흔들리면 위의 모든 지표가 함께 흔들립니다. 그래서 카운팅의 정확도와 상시성이 매장 데이터 전체의 품질을 결정합니다.
      - 반대로 카운트가 안정되면, 매출·날씨·프로모션 같은 다른 데이터와 결합해 "왜"를 설명하는 분석으로 확장할 수 있습니다.
