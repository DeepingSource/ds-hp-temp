slug: seat-turnover-rate
order: 5
category: retail
englishTitle: Seat Turnover Rate
title:
  ko: 좌석 회전율
  en: Seat Turnover Rate
  jp: 席回転率
tagline:
  ko: 카페·음식점 수익성의 핵심, 테이블이 하루 몇 번 교체되는가
  en: Key to café and restaurant profitability — how many times a table turns per day
  jp: カフェ・飲食店の収益性を左右する、テーブルが1日に何回入れ替わるかの指標です
definition:
  ko: 좌석 회전율(Seat Turnover Rate)이란 일정 시간 동안 하나의 좌석(테이블)이 몇 번 새로운 고객에게 사용되었는지를 나타내는 지표입니다. 카페·음식점의 경우 피크 타임에 회전율이 낮으면 대기 고객 이탈, 매출 손실로 이어집니다.
  en: Seat turnover rate is a metric showing how many times a single seat (or table) is used by new customers over a given period. In cafés and restaurants, a low turnover rate during peak hours leads to waiting customers leaving and lost revenue.
  jp: 席回転率（Seat Turnover Rate）とは、一定時間内に1つの座席（テーブル）が何回新しい顧客に利用されたかを示す指標です。カフェ・飲食店では、ピークタイムの回転率が低いと待ち顧客の離脱や売上の損失につながります。
relatedTerms:
  - dwell-time
  - footfall-analysis
  - behavior-analysis
relatedIndustries:
  - cafe
saaiUsage:
  ko: SAAI saai care는 카메라로 테이블별 착석 여부를 실시간 감지합니다. saai insight는 좌석별 평균 체류 시간, 시간대별 회전율, 만석률 추이를 분석해 최적 운영 시간대를 도출합니다. saai agent는 피크 타임 전 체류 시간이 기준치를 초과하는 경우 자동으로 알림을 전송합니다.
  en: ''
  jp: ''
metaDescription:
  ko: 좌석 회전율이란? 카페·음식점 매출 핵심 지표인 테이블 전환 횟수. 측정 방법, 업계 평균, AI 분석으로 회전율을 높이는 전략을 알아보세요.
  en: ''
  jp: ''
body:
  - heading:
      ko: 좌석 회전율이 카페 수익에 미치는 영향
      en: ''
      jp: ''
    paragraphs:
      ko:
        - 단위 면적당 매출(매출/㎡)을 높이려면 좌석 회전율 개선이 가장 빠른 방법입니다. 점심 피크 타임 2시간 동안 테이블 1개의 회전율이 1.5회에서 2.0회로 높아지면, 동일 인원이 근무하는 조건에서 최대 33%의 매출 증가를 기대할 수 있습니다.
        - 장시간 체류 고객(이른바 "공부족"이나 재택근무자)은 운영자 입장에서 딜레마입니다. 이들을 무작정 내보낼 수 없지만, 피크 시간 좌석 블로킹 문제는 실질적인 손실입니다. 데이터 기반으로 피크 타임을 정확히 파악하고, 자리 예약·테이크아웃 유도 전략을 수립하는 것이 해결책입니다.
      en: []
      jp: []
  - heading:
      ko: 좌석 회전율 측정 방법
      en: ''
      jp: ''
    paragraphs:
      ko:
        - 수기 기록이나 결제 시간 기반 분석은 실제 착석 시간과 오차가 큽니다. AI 기반 좌석 점유 감지는 착석 시작과 이석 시점을 자동으로 감지해 정확한 체류 시간과 회전율을 산출합니다.
        - 이 데이터를 활용하면 특정 테이블의 평균 체류 시간, 요일·시간대별 회전율 트렌드, 장기 체류 고객 비율 등을 파악해 운영 전략을 데이터로 뒷받침할 수 있습니다.
