slug: computer-vision
order: 7
category: ai
englishTitle: Computer Vision
title:
  ko: 컴퓨터 비전 (Computer Vision)
  en: Computer Vision
  jp: コンピュータビジョン (Computer Vision)
tagline:
  ko: 카메라 영상을 AI가 이해하고 분석하는 핵심 기반 기술
  en: The foundational technology that lets AI understand and analyze camera footage
  jp: カメラ映像をAIが理解し分析する、中核となる基盤技術です
definition:
  ko: 컴퓨터 비전(Computer Vision)이란 카메라로 촬영된 이미지나 영상을 딥러닝 AI가 분석해 사람, 물체, 행동을 인식하고 의미 있는 데이터로 변환하는 기술입니다. 소매업에서는 고객 동선 분석, 재고 감지, 이상 행동 탐지 등에 광범위하게 활용됩니다.
  en: Computer vision is a technology in which deep-learning AI analyzes images or video captured by cameras to recognize people, objects, and actions, converting them into meaningful data. In retail, it is widely applied to customer traffic analysis, inventory detection, and abnormal behavior detection.
  jp: コンピュータビジョン（Computer Vision）とは、カメラで撮影した画像や映像をディープラーニングAIが分析し、人・物体・行動を認識して意味のあるデータへ変換する技術です。小売業では、顧客動線分析、在庫検知、異常行動検知などに幅広く活用されています。
relatedTerms:
  - anonymized-cctv
  - retail-ai
  - anomaly-detection
  - store-heatmap
relatedIndustries:
