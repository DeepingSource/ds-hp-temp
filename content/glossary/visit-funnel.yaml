slug: visit-funnel
order: 26
category: analytics
englishTitle: Visit Funnel
title:
  ko: 방문 퍼널
  en: Visit Funnel
  jp: 来店ファネル
tagline:
  ko: 지나감 → 입장 → 체류 → 결제, 고객이 새는 단계를 찾는 틀
  en: Pass-by → entry → dwell → purchase — the frame for finding where customers leak out
  jp: 通過 → 入店 → 滞在 → 決済、顧客が漏れる段階を見つける枠組みです
definition:
  ko: 방문 퍼널(Visit Funnel)이란 매장 앞을 지나간 사람이 결제에 이르기까지의 단계 — 지나감, 입장, 체류·탐색, 결제 — 를 깔때기 모양으로 배열해 각 단계의 전환율을 읽는 분석 틀입니다. 이커머스의 구매 퍼널을 오프라인 매장에 옮긴 개념으로, 어느 단계에서 고객이 이탈하는지를 정량화합니다.
  en: The visit funnel arranges the stages from passing by to paying — pass-by, entry, dwell and browse, purchase — as a funnel and reads the conversion rate at each stage. It brings e-commerce's purchase funnel to physical stores, quantifying where customers drop off.
  jp: 来店ファネル（Visit Funnel）とは、店の前を通った人が決済に至るまでの段階 — 通過、入店、滞在・回遊、決済 — をファネル状に並べ、各段階の転換率を読む分析枠組みです。ECの購買ファネルをオフライン店舗に持ち込んだ概念で、どの段階で顧客が離脱するかを定量化します。
relatedTerms:
  - capture-rate
  - purchase-conversion-rate
  - dwell-time
  - pos-data-limitations
relatedIndustries:
  - convenience
  - drugstore
  - mart
saaiUsage: store count가 퍼널의 첫 단(지나감·입장·유입률)을, saai insight가 그 안쪽(체류·탐색·픽업·결제 전환)을 잇습니다. POS에는 마지막 단(결제)만 남지만, saai는 그 앞의 모든 단계를 데이터로 만들어 어디가 병목인지 — 입지인지, 전면인지, 진열인지, 가격인지 — 를 가립니다.
metaDescription: 방문 퍼널이란? 지나감→입장→체류→결제 단계별 전환율로 오프라인 매장의 이탈 지점을 찾는 분석 틀. 단계별 읽는 법을 설명합니다.
body:
  - heading: POS가 못 보는 앞 단계
    paragraphs:
      - 매출이 떨어졌을 때 POS가 말해주는 것은 결제가 줄었다는 사실뿐입니다. 통행이 줄었는지, 유입률이 낮아졌는지, 들어온 손님이 사지 않고 나갔는지는 구분되지 않습니다. 처방이 다 다른 문제들이 한 숫자에 뭉쳐 있는 셈입니다.
      - 퍼널로 펼치면 문제가 분리됩니다. 통행이 줄었으면 입지·시즌의 문제, 유입률이 낮으면 전면의 문제, 체류 대비 결제가 낮으면 진열·가격·응대의 문제 — 단계마다 책임이 다른 곳으로 갑니다.
  - heading: 퍼널을 읽는 법
    paragraphs:
      - 각 단계의 절대값보다 단계 사이의 전환율 변화를 봅니다. 같은 매장의 시간대별·요일별 전환율, 진열 변경 전후의 전환율 비교가 실질적인 판단 근거입니다.
      - 단계를 더 쪼갤 수도 있습니다. 특정 진열대 앞 방문 → 노출 → 탐색 → 픽업 → 결제처럼 진열대 단위 퍼널로 내려가면, 개별 매대의 문제까지 짚을 수 있습니다.
