slug: capture-rate
order: 20
category: analytics
englishTitle: Capture Rate
title:
  ko: 유입률
  en: Capture Rate
  jp: 流入率
tagline:
  ko: 매장 앞을 지나간 사람 중 실제로 들어온 비율 — 입지 문제와 매장 문제를 가르는 지표
  en: The share of passers-by who actually walk in — the metric that tells a location problem from a store problem
  jp: 店の前を通った人のうち実際に入店した割合 — 立地の問題と店舗の問題を見分ける指標です
definition:
  ko: 유입률(Capture Rate)이란 매장 앞을 지나간 유동인구 중 실제로 매장에 입장한 고객의 비율입니다. 입장객 수를 통행 인구로 나눠 계산합니다. 통행 인구가 입지의 기초 체력이라면, 입장객은 매장이 만들어낸 실제 수요입니다. 유입률이 낮으면 간판·쇼윈도·입구 등 매장의 문제, 통행 자체가 적으면 입지의 문제로 원인이 갈립니다.
  en: Capture rate is the share of the footfall passing a store that actually enters, calculated as entries divided by passers-by. Footfall is the location's baseline; entries are the demand the store itself creates. A low capture rate points to a store problem — signage, window, entrance — while low footfall itself points to a location problem.
  jp: 流入率（Capture Rate）とは、店の前を通った通行人のうち実際に入店した顧客の割合で、入店数を通行量で割って算出します。通行量が立地の基礎体力なら、入店数は店舗がつくり出した実需です。流入率が低ければ看板・ショーウィンドウ・入口など店舗側の問題、通行量そのものが少なければ立地の問題と、原因が分かれます。
