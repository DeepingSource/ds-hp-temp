slug: video-anonymization
order: 23
category: ai
englishTitle: Video Anonymization
title:
  ko: 영상 익명화
  en: Video Anonymization
  jp: 映像匿名化
tagline:
  ko: 분석에 필요한 신호만 남기고 신원을 지워, 영상을 개인정보 없이 쓰는 기술
  en: Erasing identity while keeping the signals analysis needs — video without personal data
  jp: 分析に必要な信号だけを残して身元を消し、映像を個人情報なしで使う技術です
definition:
  ko: 영상 익명화(Video Anonymization)란 영상 속 개인을 알아볼 수 있는 정보(얼굴 등 신원 요소)를 제거하면서, 움직임·자세처럼 분석에 필요한 신호는 유지하는 기술입니다. 원본 복원이 불가능한 비가역 방식이면, 익명화된 데이터는 개인정보보호법(제58조의2)·GDPR(Recital 26)·CCPA에서 개인정보로 취급되지 않습니다.
  en: Video anonymization removes identifying elements (such as faces) from footage while preserving the signals analysis needs, like movement and pose. When irreversible, the anonymized data falls outside personal-data regimes — Korea PIPA (Article 58-2), GDPR (Recital 26), and the CCPA.
  jp: 映像匿名化（Video Anonymization）とは、映像内の個人を識別できる情報（顔などの身元要素）を除去しながら、動きや姿勢など分析に必要な信号は維持する技術です。原本復元が不可能な非可逆方式であれば、匿名化されたデータは韓国個人情報保護法（第58条の2）・GDPR（Recital 26）・CCPAで個人情報として扱われません。
