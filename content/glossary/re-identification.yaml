slug: re-identification
order: 25
category: ai
englishTitle: Re-Identification (Re-ID)
title:
  ko: 재식별 (Re-ID)
  en: Re-Identification (Re-ID)
  jp: 再識別（Re-ID）
tagline:
  ko: 카메라를 옮겨 다니는 같은 객체를 익명 특징으로 이어 붙이는 비전 기술 — 신원 확인과는 다릅니다
  en: Linking the same object across cameras by anonymous features — not identity verification
  jp: カメラをまたぐ同じオブジェクトを匿名特徴でつなぐビジョン技術 — 身元確認とは異なります
definition:
  ko: 재식별(Re-Identification, Re-ID)이란 서로 다른 카메라·시점에 찍힌 객체가 같은 객체인지를 외형 특징 임베딩으로 판별하는 컴퓨터 비전 기술입니다. 이름·신원을 알아내는 기술이 아니라, "3번 카메라의 A와 7번 카메라의 B가 같은 사람인가"를 익명 상태로 잇는 기술로, 멀티카메라 추적(MTMC)의 핵심 요소입니다.
  en: Re-Identification (Re-ID) is a computer-vision technique that determines whether objects seen by different cameras are the same object, using appearance-feature embeddings. It does not reveal names or identity — it anonymously links "A on camera 3" with "B on camera 7," and is a core building block of multi-camera tracking (MTMC).
  jp: 再識別（Re-Identification、Re-ID）とは、異なるカメラ・時点に映ったオブジェクトが同一かどうかを、外見特徴の埋め込みで判別するコンピュータビジョン技術です。名前や身元を突き止める技術ではなく、「カメラ3のAとカメラ7のBは同じ人か」を匿名のままつなぐ技術で、マルチカメラ追跡（MTMC）の中核要素です。
