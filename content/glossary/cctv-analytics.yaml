category: ai
englishTitle: CCTV Analytics Solution
title:
  ko: CCTV 분석 솔루션
  en: CCTV Analytics Solution
  jp: CCTV分析ソリューション
tagline:
  ko: 보안용 CCTV를 매장 운영 데이터 수집 도구로 전환하는 솔루션
  en: A solution that turns security CCTV into a tool for collecting store operations data
  jp: 防犯用CCTVを店舗運営データの収集ツールへと転換するソリューションです
definition:
  ko: CCTV 분석 솔루션이란 매장에 이미 설치된 CCTV 카메라의 영상을 AI가 실시간으로 분석해 고객 행동 데이터, 이상 상황 감지, 공간 활용도 분석 등 운영 인사이트를 제공하는 소프트웨어 솔루션입니다. 새로운 하드웨어 없이 기존 인프라를 활용하는 것이 특징입니다.
  en: A CCTV analytics solution is software in which AI analyzes, in real time, footage from cameras already installed in a store to deliver operational insights such as customer behavior data, abnormal-situation detection, and space-utilization analysis. Its defining trait is that it leverages existing infrastructure without requiring new hardware.
  jp: CCTV分析ソリューションとは、店舗にすでに設置されたCCTVカメラの映像をAIがリアルタイムで分析し、顧客行動データ・異常状況の検知・空間活用度の分析といった運営インサイトを提供するソフトウェアソリューションです。新たなハードウェアを必要とせず、既存インフラを活用する点が特徴です。
