slug: store-heatmap
order: 1
category: analytics
englishTitle: Store Heatmap
title:
  ko: 매장 히트맵
  en: Store Heatmap
  jp: 店舗ヒートマップ
tagline:
  ko: 고객이 어디에 오래 머물렀는지 색상으로 보는 공간 데이터
  en: Spatial data that shows where customers lingered, visualized in color
  jp: 顧客がどこに長く滞在したかを色で可視化する空間データです
definition:
  ko: 매장 히트맵(Store Heatmap)이란 매장 내 특정 구역에 고객이 얼마나 오래 머물렀는지, 얼마나 자주 방문했는지를 색상 농도로 시각화한 데이터 지도입니다. 빨간색 구역은 집중 체류 지점, 파란색은 방문이 드문 사각지대를 의미합니다.
  en: A store heatmap is a data map that visualizes, through color intensity, how long and how often customers dwell in specific areas of a store. Red zones mark high-engagement hotspots, while blue zones indicate blind spots that customers rarely visit.
  jp: 店舗ヒートマップとは、店舗内の特定エリアに顧客がどれだけ長く滞在し、どれだけ頻繁に訪れたかを色の濃淡で可視化したデータマップです。赤いエリアは滞在が集中するホットスポットを、青いエリアは訪問の少ない死角を示します。
relatedTerms:
  - dwell-time
  - zone-analysis
  - purchase-conversion-rate
  - anonymized-cctv
relatedIndustries:
  - convenience
  - drugstore
  - mart
saaiUsage:
  ko: SAAI의 saai care는 기존 CCTV 영상을 실시간으로 분석해 구역별 체류 히트맵을 자동 생성합니다. 얼굴이나 개인정보는 일절 수집하지 않으며, 익명화된 행동 데이터만 활용합니다. 히트맵 데이터는 saai insight 대시보드에서 시간대별, 요일별로 비교 분석할 수 있어 진열 개편 의사결정의 근거로 사용됩니다.
  en: ''
  jp: ''
metaDescription:
  ko: 매장 히트맵이란? 고객 체류 패턴을 색상으로 시각화하는 공간 분석 기술. CCTV AI 분석으로 진열 최적화와 매출 개선에 활용하는 방법을 알아보세요.
  en: ''
  jp: ''
body:
  - heading:
      ko: 매장 히트맵이 필요한 이유
      en: ''
      jp: ''
    paragraphs:
      ko:
        - 매장 운영자가 가장 많이 받는 질문 중 하나는 "어떤 매대가 실제로 고객의 눈길을 끄는가?"입니다. 매출 데이터는 무엇이 팔렸는지 알려주지만, 팔리지 않은 이유는 알려주지 않습니다. 히트맵은 바로 그 공백을 채워줍니다.
        - 고객이 특정 구역에서 30초 이상 머무르는 비율이 높다면 그 구역은 주목도가 높은 "골든 존"입니다. 반대로 체류 시간이 짧고 이동 경로에서 자주 생략된다면 진열 방식이나 위치를 재검토해야 한다는 신호입니다.
        - 히트맵을 활용하면 진열 개편 전후를 비교하거나, 시간대별 고객 행동을 분석해 직원 배치와 재고 보충 타이밍을 최적화할 수 있습니다.
      en: []
      jp: []
  - heading:
      ko: 히트맵 데이터를 얻는 방법
      en: ''
      jp: ''
    paragraphs:
      ko:
        - 과거에는 와이파이 신호 추적이나 전용 센서 설치가 필요했습니다. 하지만 최근에는 기존 CCTV 영상을 AI가 실시간으로 분석해 별도 하드웨어 없이 히트맵을 생성하는 방식이 확산되고 있습니다.
        - 익명화 기반 AI는 개인을 특정하지 않고 "이 구역에 누군가 있었다"는 점유 정보만 추출합니다. 이를 통해 개인정보보호법을 준수하면서도 고해상도 공간 분석이 가능합니다.
      en: []
      jp: []
