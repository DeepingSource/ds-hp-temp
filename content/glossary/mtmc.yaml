category: ai
englishTitle: MTMC (Multi-Target Multi-Camera Tracking)
title:
  ko: 멀티카메라 추적 (MTMC)
  en: MTMC (Multi-Target Multi-Camera Tracking)
  jp: マルチカメラ追跡（MTMC）
tagline:
  ko: 여러 대의 카메라 화면을 이어 붙여, 매장 전체를 하나의 공간으로 읽는 기술
  en: Stitching multiple camera views together to read the whole store as one space
  jp: 複数のカメラ映像をつなぎ合わせ、店舗全体をひとつの空間として読む技術です
definition:
  ko: MTMC(Multi-Target Multi-Camera Tracking)란 여러 대의 카메라에 나눠 찍힌 움직임을 하나로 이어, 다수의 객체를 매장 전체 공간에서 연속으로 추적하는 컴퓨터 비전 기술입니다. 카메라 한 대의 사각지대를 다른 카메라가 메워, 입장부터 퇴장까지 끊기지 않는 동선을 만듭니다.
  en: MTMC (Multi-Target Multi-Camera Tracking) is a computer-vision technique that joins movement captured across multiple cameras, tracking many objects continuously across the whole store. One camera's blind spot is covered by another, producing unbroken pathways from entry to exit.
  jp: MTMC（Multi-Target Multi-Camera Tracking）とは、複数のカメラに分かれて映った動きをひとつにつなぎ、多数のオブジェクトを店舗全体の空間で連続して追跡するコンピュータビジョン技術です。1台のカメラの死角を別のカメラが補い、入店から退店まで途切れない動線をつくります。
