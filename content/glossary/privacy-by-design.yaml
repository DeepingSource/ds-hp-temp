slug: privacy-by-design
order: 24
category: ai
englishTitle: Privacy by Design
title:
  ko: 프라이버시 바이 디자인
  en: Privacy by Design
  jp: プライバシー・バイ・デザイン
tagline:
  ko: 문제가 생긴 뒤 고치는 게 아니라, 설계 단계에서 개인정보 보호를 내장하는 원칙
  en: Building privacy into the design itself, not patching it after problems appear
  jp: 問題が起きてから直すのではなく、設計段階で個人情報保護を組み込む原則です
definition:
  ko: 프라이버시 바이 디자인(Privacy by Design)이란 시스템을 만들 때부터 개인정보 보호를 기본값으로 설계에 내장하는 원칙입니다. GDPR 제25조가 요구하는 "설계 및 기본값에 의한 데이터 보호"의 바탕이 된 개념으로, 사후 동의·삭제에 기대는 대신 애초에 개인정보가 생기지 않거나 최소화되는 구조를 지향합니다.
  en: Privacy by Design is the principle of building privacy protection into a system from the start, as the default. It underpins GDPR Article 25's "data protection by design and by default" — aiming for structures where personal data never arises or is minimized, rather than relying on after-the-fact consent and deletion.
  jp: プライバシー・バイ・デザイン（Privacy by Design）とは、システムをつくる時点から個人情報保護をデフォルトとして設計に組み込む原則です。GDPR第25条の「データ保護・バイ・デザイン」の土台となった概念で、事後の同意・削除に頼るのではなく、そもそも個人情報が生じない・最小化される構造を目指します。
