  en: Zone-by-zone work efficiency analysis for logistics
  jp: 物流のエリア別作業効率分析
excerpt:
  ko: 어느 구역에서 작업 병목이 발생하는지 데이터로 파악하고 물류 동선을 최적화하는 방법
  en: How to identify where work bottlenecks occur with data and optimize logistics flow.
  jp: どのエリアで作業のボトルネックが発生するのかをデータで把握し、物流動線を最適化する方法です。
impact:
  ko: +15%
  en: ""
  jp: ""
impactLabel:
  ko: 구역별 처리량 효율 향상
  en: improvement in zone throughput efficiency
  jp: エリア別処理量の効率向上
problem: 특정 구역에서 작업이 몰리거나 대기가 발생하는데 정확한 원인을 파악하기 어렵습니다. 작업자 동선이 최적화되어 있는지 데이터 없이 판단하기 어렵습니다.
background:
  heading:
    ko: 물류 효율의 데이터화
    en: Turning logistics efficiency into data
    jp: 物流効率のデータ化
  body: 물류센터의 처리 효율은 각 구역의 처리량, 대기 시간, 동선 거리에 따라 결정됩니다. 특정 피킹 구역에서 작업자가 불필요하게 길게 이동하거나, 특정 통로가 병목이 되는 경우를 데이터로 확인하면 레이아웃 최적화와 작업 배분 개선이 가능합니다.
causes:
  - title:
      ko: 구역별 처리량 실시간 측정 부재
      en: No real-time throughput measurement by zone
      jp: エリア別処理量のリアルタイム測定の不在
    desc: 각 구역에서 시간당 처리되는 물량을 실시간으로 집계하는 수단이 없습니다.
  - title:
      ko: 작업 병목 구간 파악 어려움
      en: Hard to identify work bottlenecks
      jp: 作業ボトルネック区間の把握が難しい
    desc: 어느 구역에서 작업이 막히고 대기가 발생하는지 관리자가 실시간으로 파악하기 어렵습니다.
steps:
  - product: StoreCare
    title:
      ko: 구역별 작업자 분포 및 이동 패턴 측정
      en: Measure worker distribution and movement by zone
      jp: エリア別の作業者分布と移動パターンを測定
    desc: 물류센터 내 각 구역의 작업자 수, 평균 체류 시간, 이동 거리를 자동으로 측정합니다. 특정 구역 과밀이나 공백을 실시간으로 파악합니다.
  - product: StoreInsight
    title:
      ko: 작업 병목 구간 및 효율 저하 패턴 분석
      en: Bottleneck and efficiency-drop pattern analysis
      jp: 作業ボトルネックと効率低下パターンの分析
    desc: 시간대별 구역별 처리량을 집계해 병목이 발생하는 시간대와 구역을 파악합니다. 불필요하게 긴 이동 동선을 식별해 레이아웃 개선 방향을 제안합니다.
  - product: StoreAgent
    title:
      ko: 실시간 작업 배분 최적화 알림
      en: Real-time work-allocation optimization alerts
      jp: リアルタイム作業配分最適化の通知
    desc: 특정 구역에 작업자가 과밀하거나 부족할 때 즉시 안내를 발송합니다. 주간 리포트로 구역별 효율 트렌드를 제공해 시프트 계획 최적화를 지원합니다.
results:
  - stat: +15%
    label:
      ko: 구역별 처리량 효율 향상
