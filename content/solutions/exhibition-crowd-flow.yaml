slug: exhibition-crowd-flow
order: 18
industry: exhibition
title:
  ko: 전시 공간 인파 흐름 관리
  en: Crowd flow management for exhibition spaces
  jp: 展示空間の人流管理
excerpt:
  ko: 특정 구역의 과밀 집중을 실시간으로 감지하고 관람 흐름을 분산하는 방법
  en: How to detect overcrowding in specific zones in real time and disperse visitor flow.
  jp: 特定エリアへの過密集中をリアルタイムで検知し、観覧の流れを分散する方法です。
impact:
  ko: "-25%"
  en: ""
  jp: ""
impactLabel:
  ko: 관람 혼잡 발생 건수 감소
  en: reduction in crowding incidents
  jp: 観覧混雑の発生件数削減
problem: 인기 부스나 특정 구역에 관람객이 집중되어 혼잡이 발생합니다. 실시간으로 파악하고 안내 방송이나 직원 배치로 분산하기 어렵습니다.
background:
  heading:
    ko: 전시 혼잡의 두 가지 문제
    en: Two problems of exhibition crowding
    jp: 展示混雑の二つの問題
  body: 과밀 혼잡은 관람 경험을 저하시킬 뿐 아니라 안전 위험도 초래합니다. 반면 방문이 적은 구역은 참가 기업의 투자 대비 성과가 낮아집니다. 실시간 혼잡도 데이터가 있으면 안내 방송이나 직원 배치로 흐름을 분산해 이 두 가지 문제를 동시에 개선할 수 있습니다.
causes:
  - title:
      ko: 실시간 혼잡도 파악 불가
      en: Cannot grasp real-time congestion
      jp: リアルタイム混雑度を把握できない
    desc: 어느 구역에 지금 몇 명이 집중되어 있는지 실시간으로 파악하는 수단이 없습니다.
  - title:
      ko: 분산 조치 타이밍 늦음
      en: Dispersal measures come too late
      jp: 分散措置のタイミングが遅い
    desc: 혼잡이 이미 발생한 후에야 직원이 발견하고 조치를 취해 효과가 제한됩니다.
steps:
  - product: StoreCare
    title:
      ko: 구역별 실시간 혼잡도 모니터링
      en: Real-time congestion monitoring by zone
      jp: エリア別のリアルタイム混雑度モニタリング
    desc: 전시 공간 전체 구역의 동시 체류 인원을 실시간으로 측정합니다. 설정 임계치를 초과 시 푸시 전송이 이루어집니다.
  - product: StoreInsight
    title:
      ko: 인파 흐름 패턴 분석
      en: Crowd-flow pattern analysis
      jp: 人流パターンの分析
    desc: 행사 기간 중 인파 집중이 발생하는 시간대, 구역, 원인을 파악합니다. 다음 행사의 레이아웃 설계에 활용합니다.
  - product: StoreAgent
    title:
      ko: 혼잡 조기 포착 및 분산 알림
      en: Early congestion capture and dispersal alerts
      jp: 混雑の早期捕捉と分散通知
    desc: 혼잡이 예상되는 15분 전에 담당자에게 실시간 통보를 발송합니다. "A 구역 혼잡 예상 — 인근 직원 배치 또는 안내 방송 권장" 형태로 구체적인 대응 방안을 제안합니다.
results:
  - stat: "-25%"
    label:
      ko: 혼잡 발생 건수 감소
      en: Reduction in crowding incidents
      jp: 混雑発生件数の削減
  - stat: 15분
    label:
      ko: 혼잡 예측 선행 시간
      en: Congestion forecast lead time
      jp: 混雑予測の先行時間
  - stat: 전 구역
    label:
      ko: 실시간 모니터링 범위
      en: Real-time monitoring coverage
      jp: リアルタイムモニタリング範囲
metaDescription: 전시 공간 인파 흐름 관리 방법. AI로 구역별 혼잡도 실시간 모니터링, 15분 전 예측 알림. 혼잡 발생 25% 감소. 전시·박람회 운영 최적화 방법.
