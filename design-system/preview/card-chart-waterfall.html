<!doctype html>
<html><head><meta charset="utf-8"><title>Waterfall — start → change → end</title>
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="../charts.css">
<style>body{padding:18px 22px;background:#fff;gap:0}
.box{max-width:640px}
svg{display:block;width:100%;height:220px;overflow:visible;font-family:var(--font-sans)}
text{font-size:11px;fill:var(--grey-700)}
.muted{fill:var(--grey-400)}
.pos{fill:#18A713}
.neg{fill:#CC5151}
.neut{fill:#787F89}
</style></head><body>
<div class="box">
  <h3 class="chart-takeaway">월간 활성 매출, 전월 대비 +₩520K로 마감</h3>
  <p class="chart-meta">2026-03 → 04 · MRR equivalent breakdown</p>
  <svg viewBox="0 0 640 220">
    <line x1="20" y1="180" x2="620" y2="180" stroke="#D9DBDD"/>

    <!-- Start -->
    <rect x="40"  y="60"  width="60" height="120" class="neut"/>
    <text x="70"  y="200" text-anchor="middle">Mar</text>
    <text x="70"  y="52"  text-anchor="middle" font-weight="600">4.30M</text>

    <!-- + new (positive) -->
    <line x1="100" y1="60" x2="140" y2="60" stroke="#787F89" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="140" y="20"  width="60" height="40"  class="pos"/>
    <text x="170" y="200" text-anchor="middle">+신규</text>
    <text x="170" y="14"  text-anchor="middle" class="pos" font-weight="600">+780K</text>

    <!-- − churn -->
    <line x1="200" y1="20" x2="240" y2="20" stroke="#787F89" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="240" y="20"  width="60" height="60"  class="neg"/>
    <text x="270" y="200" text-anchor="middle">−이탈</text>
    <text x="270" y="14"  text-anchor="middle" class="neg" font-weight="600">−180K</text>

    <!-- − downgrade -->
    <line x1="300" y1="80" x2="340" y2="80" stroke="#787F89" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="340" y="80"  width="60" height="30"  class="neg"/>
    <text x="370" y="200" text-anchor="middle">−다운그레이드</text>
    <text x="370" y="74"  text-anchor="middle" class="neg" font-weight="600">−80K</text>

    <!-- = end -->
    <line x1="400" y1="110" x2="440" y2="110" stroke="#787F89" stroke-width="1" stroke-dasharray="3 3"/>
    <rect x="440" y="40"  width="60" height="140" class="neut"/>
    <text x="470" y="200" text-anchor="middle">Apr</text>
    <text x="470" y="32"  text-anchor="middle" font-weight="600">4.82M</text>

    <!-- Δ summary -->
    <text x="560" y="60" text-anchor="middle" class="pos" font-weight="700" font-size="14">Δ +520K</text>
    <text x="560" y="78" text-anchor="middle" class="muted">+12.1%</text>
  </svg>
  <p class="chart-source">Source · plus-agent revenue ledger · KRW</p>
</div>
</body></html>
