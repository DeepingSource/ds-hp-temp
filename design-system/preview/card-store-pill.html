<!doctype html>
<html><head><meta charset="utf-8"><title>Store selector pill</title>
<link rel="stylesheet" href="_card.css">
<style>body{padding:24px 22px;background:#fff;gap:12px}
.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:900px;background:#fff;box-shadow:0px 0px 20px 0px rgba(135,135,135,0.12);font-size:13px;color:var(--grey-900);font-weight:500;cursor:pointer}
.pill .ic{width:16px;height:16px;color:var(--grey-700)}
.pill .car{width:10px;height:10px;color:var(--grey-400)}
.pill.active{outline:2px solid var(--blue-300);outline-offset:0}
</style></head><body>
<div class="pill">
  <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9 4.5 4.5h15L21 9M3 9v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9M3 9h18M8 14h4"/></svg>
  Gangnam · Plus Agent demo store
  <svg class="car" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m3 4.5 3 3 3-3"/></svg>
</div>
<div class="pill active">
  <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9 4.5 4.5h15L21 9M3 9v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9M3 9h18M8 14h4"/></svg>
  Hongdae · 2nd branch
  <svg class="car" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m3 4.5 3 3 3-3"/></svg>
</div>
</body></html>
