<!doctype html>
<html><head><meta charset="utf-8"><title>Anti-pattern — truncated Y-axis</title>
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="../charts.css">
<style>body{padding:16px 22px;background:#fff;gap:8px}
.row{display:flex;gap:18px;align-items:flex-start}
.col{flex:1;min-width:0}
.h{font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.bad{color:#9F3F3F}
.good{color:#0E650C}
svg{display:block;width:100%;height:160px;overflow:visible;font-family:var(--font-sans)}
text{font-size:10px;fill:var(--grey-300)}
.note{font-size:11px;color:var(--grey-500);line-height:1.5}
</style></head><body>
<div class="row">
  <div class="col">
    <div class="h bad">✕ Y starts at 95 — 3% looks like a cliff</div>
    <svg viewBox="0 0 280 160">
      <line x1="40" y1="140" x2="270" y2="140" stroke="#D9DBDD"/>
      <text x="34" y="44" text-anchor="end">100</text>
      <text x="34" y="92" text-anchor="end">98</text>
      <text x="34" y="140" text-anchor="end">95</text>
      <rect x="60"  y="60"  width="32" height="80" fill="#D9DBDD"/>
      <rect x="110" y="50"  width="32" height="90" fill="#D9DBDD"/>
      <rect x="160" y="40"  width="32" height="100" fill="#376AE2"/>
      <rect x="210" y="20"  width="32" height="120" fill="#D9DBDD"/>
      <text x="76"  y="155" text-anchor="middle">Mon</text>
      <text x="126" y="155" text-anchor="middle">Tue</text>
      <text x="176" y="155" text-anchor="middle">Wed</text>
      <text x="226" y="155" text-anchor="middle">Thu</text>
    </svg>
  </div>
  <div class="col">
    <div class="h good">✓ Y starts at 0 — change reads honestly</div>
    <svg viewBox="0 0 280 160">
      <line x1="40" y1="140" x2="270" y2="140" stroke="#D9DBDD"/>
      <text x="34" y="44" text-anchor="end">100</text>
      <text x="34" y="92" text-anchor="end">50</text>
      <text x="34" y="140" text-anchor="end">0</text>
      <rect x="60"  y="20"  width="32" height="120" fill="#D9DBDD"/>
      <rect x="110" y="18"  width="32" height="122" fill="#D9DBDD"/>
      <rect x="160" y="16"  width="32" height="124" fill="#376AE2"/>
      <rect x="210" y="14"  width="32" height="126" fill="#D9DBDD"/>
      <text x="76"  y="155" text-anchor="middle">Mon</text>
      <text x="126" y="155" text-anchor="middle">Tue</text>
      <text x="176" y="155" text-anchor="middle">Wed</text>
      <text x="226" y="155" text-anchor="middle">Thu</text>
    </svg>
  </div>
</div>
<div class="note">Bar charts: Y-axis must start at 0. To emphasise small change, plot the change itself (Δ or %), not the level.</div>
</body></html>
