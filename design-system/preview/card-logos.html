<!doctype html>
<html><head><meta charset="utf-8"><title>Logos & wordmarks</title>
<link rel="stylesheet" href="_card.css">
<style>body{padding:20px 22px;gap:14px;background:#fff}
.row{gap:24px;align-items:center;flex-wrap:wrap}
.tile{display:flex;flex-direction:column;align-items:center;gap:8px}
.tile img{display:block}
.tile .n{font-size:10px;color:var(--grey-300);text-transform:uppercase;letter-spacing:.06em}
.divider{height:48px;width:1px;background:var(--grey-50)}
</style></head><body>
<div class="row">
  <div class="tile"><img src="../assets/logos/symbol.svg" style="height:44px"><div class="n">symbol</div></div>
  <div class="divider"></div>
  <div class="tile"><img src="../assets/logos/SAAI.svg" style="height:44px"><div class="n">SAAI lockup</div></div>
  <div class="divider"></div>
  <div class="tile"><img src="../assets/logos/logo-with-text.svg" style="height:32px"><div class="n">in-app lockup</div></div>
</div>
<div class="row" style="margin-top:6px">
  <div class="tile"><img src="../assets/logos/store-agent.svg" style="height:30px"><div class="n">store agent</div></div>
  <div class="divider"></div>
  <div class="tile"><img src="../assets/logos/store-care.svg" style="height:30px"><div class="n">store care</div></div>
  <div class="divider"></div>
  <div class="tile"><img src="../assets/logos/store-insight.svg" style="height:30px"><div class="n">store insight</div></div>
</div>
</body></html>
