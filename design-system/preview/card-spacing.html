<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale (2px grid)</title>
<link rel="stylesheet" href="_card.css">
<style>body{padding:20px 22px;gap:6px}
.s{display:flex;align-items:center;gap:14px}
.bar{height:14px;background:var(--blue-500);border-radius:2px}
.k{font-size:11px;color:var(--grey-500);font-family:ui-monospace,Menlo,monospace;min-width:60px}
.l{font-size:11px;color:var(--grey-300)}
</style>
</head><body>
<div class="s"><div class="k">2px</div><div class="bar" style="width:2px"></div><div class="l">hairline gap</div></div>
<div class="s"><div class="k">4px</div><div class="bar" style="width:4px"></div><div class="l">icon ↔ label</div></div>
<div class="s"><div class="k">6px</div><div class="bar" style="width:6px"></div><div class="l">chip inner</div></div>
<div class="s"><div class="k">8px</div><div class="bar" style="width:8px"></div><div class="l">row gap</div></div>
<div class="s"><div class="k">12px</div><div class="bar" style="width:12px"></div><div class="l">card padding</div></div>
<div class="s"><div class="k">16px</div><div class="bar" style="width:16px"></div><div class="l">composer pad</div></div>
<div class="s"><div class="k">24px</div><div class="bar" style="width:24px"></div><div class="l">section</div></div>
<div class="s"><div class="k">40px</div><div class="bar" style="width:40px"></div><div class="l">hero margin</div></div>
</body></html>
