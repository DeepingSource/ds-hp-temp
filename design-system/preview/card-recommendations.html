<!doctype html>
<html><head><meta charset="utf-8"><title>Recommendation list</title>
<link rel="stylesheet" href="_card.css">
<style>body{padding:24px 22px;background:#fff;gap:8px}
.head{display:flex;align-items:center;justify-content:space-between;max-width:560px;margin-bottom:4px}
.head .l{font-size:11px;color:var(--grey-400);text-transform:uppercase;letter-spacing:.06em}
.head .r{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--grey-500);cursor:pointer}
.q{display:flex;align-items:center;gap:10px;border:1px solid var(--grey-100);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--grey-900);max-width:560px;cursor:pointer;transition:border-color 150ms,background-color 150ms}
.q:hover{border-color:var(--blue-300);background:var(--blue-25,#F7F9FD)}
.q .ic{width:14px;height:14px;color:var(--grey-300)}
</style></head><body>
<div class="head"><span class="l">Try asking</span>
  <span class="r"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a5 5 0 1 0 1.5-3.5L3 6m0-3v3h3"/></svg> Refresh</span>
</div>
<div class="q"><svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m6 4 4 4-4 4"/></svg>어제 대비 매출 변화는 어떻게 됐어?</div>
<div class="q"><svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m6 4 4 4-4 4"/></svg>Which categories sold the most last weekend?</div>
<div class="q"><svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m6 4 4 4-4 4"/></svg>방문 고객 수 시간대별 분포 보여줘</div>
</body></html>
