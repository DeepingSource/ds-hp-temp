<!doctype html>
<html><head><meta charset="utf-8"><title>Corner radii</title>
<link rel="stylesheet" href="_card.css">
<style>body{padding:18px 22px}
.row{gap:18px;align-items:flex-end}
.box{display:flex;flex-direction:column;align-items:center;gap:6px}
.b{width:84px;height:60px;background:var(--grey-25);border:1px solid var(--grey-100)}
.box .k{font-size:11px;color:var(--grey-500);font-family:ui-monospace,Menlo,monospace}
.box .l{font-size:10px;color:var(--grey-300);text-transform:uppercase;letter-spacing:.06em}
</style>
</head><body>
<div class="row">
  <div class="box"><div class="b" style="border-radius:4px"></div><div class="k">4px</div><div class="l">menu row</div></div>
  <div class="box"><div class="b" style="border-radius:6px"></div><div class="k">6px</div><div class="l">button</div></div>
  <div class="box"><div class="b" style="border-radius:8px"></div><div class="k">8px</div><div class="l">bubble · card</div></div>
  <div class="box"><div class="b" style="border-radius:10px"></div><div class="k">10px</div><div class="l">input · paper</div></div>
  <div class="box"><div class="b" style="width:120px;border-radius:900px"></div><div class="k">900px</div><div class="l">store pill</div></div>
</div>
</body></html>
