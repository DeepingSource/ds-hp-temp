<!doctype html>
<html><head><meta charset="utf-8"><title>Chart palettes</title>
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="../charts.css">
<style>body{padding:18px 22px;background:#fff;gap:14px}
.title{font-size:11px;color:var(--grey-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.row{gap:6px;align-items:center}
.sw{width:46px;height:24px;border-radius:4px}
.lbl{font-size:10px;color:var(--grey-400);font-family:ui-monospace,Menlo,monospace;width:46px;text-align:center}
.col{gap:4px;align-items:center}
</style></head><body>
<div>
  <div class="title">Categorical · 6 (cognitive limit)</div>
  <div class="row">
    <div class="col"><div class="sw" style="background:#376AE2"></div><div class="lbl">cat-1</div></div>
    <div class="col"><div class="sw" style="background:#76CCCF"></div><div class="lbl">cat-2</div></div>
    <div class="col"><div class="sw" style="background:#B65BE1"></div><div class="lbl">cat-3</div></div>
    <div class="col"><div class="sw" style="background:#FAD232"></div><div class="lbl">cat-4</div></div>
    <div class="col"><div class="sw" style="background:#1AB715"></div><div class="lbl">cat-5</div></div>
    <div class="col"><div class="sw" style="background:#E05959"></div><div class="lbl">cat-6</div></div>
  </div>
</div>
<div>
  <div class="title">Sequential · single-hue (heatmaps, density)</div>
  <div class="row" style="gap:0">
    <div style="flex:1;height:24px;background:#F7F9FD"></div>
    <div style="flex:1;height:24px;background:#EBF0FC"></div>
    <div style="flex:1;height:24px;background:#C1D1F6"></div>
    <div style="flex:1;height:24px;background:#799BEC"></div>
    <div style="flex:1;height:24px;background:#376AE2"></div>
    <div style="flex:1;height:24px;background:#274BA0"></div>
    <div style="flex:1;height:24px;background:#172D5F"></div>
  </div>
</div>
<div>
  <div class="title">Diverging · variance vs target / 0</div>
  <div class="row" style="gap:0">
    <div style="flex:1;height:24px;background:#9F3F3F"></div>
    <div style="flex:1;height:24px;background:#E05959"></div>
    <div style="flex:1;height:24px;background:#F1B3B3"></div>
    <div style="flex:1;height:24px;background:#E9E9EA"></div>
    <div style="flex:1;height:24px;background:#A3BAF2"></div>
    <div style="flex:1;height:24px;background:#376AE2"></div>
    <div style="flex:1;height:24px;background:#274BA0"></div>
  </div>
</div>
</body></html>
