<!doctype html>
<html><head><meta charset="utf-8"><title>Empty state — Ask anything</title>
<link rel="stylesheet" href="_card.css">
<style>body{padding:36px 22px;background:#fff;align-items:center;gap:18px}
.wrap{display:flex;flex-direction:column;align-items:center;gap:14px;max-width:540px;width:100%}
.sym{width:48px;height:48px}
.title{font-size:24px;line-height:1.4;font-weight:500;color:var(--grey-700);text-align:center}
.composer{width:100%;background:#fff;border:1px solid var(--grey-50);border-radius:10px;box-shadow:0px 2px 10px 0px rgba(135,135,135,0.12);padding:12px 14px;display:flex;align-items:center;gap:10px}
.composer input{flex:1;border:0;outline:0;font-size:14px;color:var(--grey-900);font-family:var(--font-sans)}
.composer input::placeholder{color:var(--grey-200)}
.send{width:30px;height:30px;border-radius:8px;background:var(--grey-100);display:flex;align-items:center;justify-content:center;color:var(--grey-300)}
</style></head><body>
<div class="wrap">
  <img class="sym" src="../assets/logos/symbol.svg">
  <div class="title">Ask anything about your store</div>
  <div class="composer">
    <input placeholder="Ask anything about your store">
    <div class="send"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2.5 8h11M9 3.5l4.5 4.5L9 12.5"/></svg></div>
  </div>
</div>
</body></html>
