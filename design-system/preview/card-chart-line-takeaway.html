<!doctype html>
<html><head><meta charset="utf-8"><title>Line — takeaway title + direct labels</title>
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="../charts.css">
<style>body{padding:18px 22px;background:#fff;gap:0}
.box{max-width:640px}
svg{display:block;width:100%;height:240px;overflow:visible;font-family:var(--font-sans)}
text{font-size:11px}
.axis{fill:var(--grey-300)}
.grid{stroke:#E9E9EA;stroke-width:1}
</style></head><body>
<div class="box">
  <h3 class="chart-takeaway">Q1 매출, 전년 대비 12% 감소</h3>
  <p class="chart-meta">2025 Q1 vs 2026 Q1 · POS daily, n=92</p>
  <svg viewBox="0 0 640 240" preserveAspectRatio="none">
    <!-- Y grid -->
    <g class="grid">
      <line x1="40" y1="30"  x2="600" y2="30"/>
      <line x1="40" y1="80"  x2="600" y2="80"/>
      <line x1="40" y1="130" x2="600" y2="130"/>
      <line x1="40" y1="180" x2="600" y2="180"/>
      <line x1="40" y1="200" x2="600" y2="200"/>
    </g>
    <!-- Y labels -->
    <g class="axis">
      <text x="34" y="34" text-anchor="end">₩6M</text>
      <text x="34" y="84" text-anchor="end">₩4.5M</text>
      <text x="34" y="134" text-anchor="end">₩3M</text>
      <text x="34" y="184" text-anchor="end">₩1.5M</text>
      <text x="34" y="204" text-anchor="end">0</text>
    </g>
    <!-- X axis labels (months) -->
    <g class="axis">
      <text x="80"  y="220" text-anchor="middle">Jan</text>
      <text x="200" y="220" text-anchor="middle">Feb</text>
      <text x="320" y="220" text-anchor="middle">Mar</text>
      <text x="440" y="220" text-anchor="middle">Apr</text>
      <text x="560" y="220" text-anchor="middle">May</text>
    </g>
    <!-- 2025 baseline (grey context) -->
    <polyline fill="none" stroke="#B1B5BB" stroke-width="1.5"
      points="80,90 200,75 320,70 440,55 560,40"/>
    <!-- 2026 highlight -->
    <polyline fill="none" stroke="#376AE2" stroke-width="2.4"
      points="80,100 200,95 320,118 440,108 560,95"/>
    <!-- Markers -->
    <circle cx="320" cy="118" r="4.5" fill="#fff" stroke="#376AE2" stroke-width="2.4"/>
    <!-- Direct labels -->
    <text x="568" y="44"  class="chart-label-ctx">2025</text>
    <text x="568" y="92"  class="chart-label-emph">2026</text>
    <!-- Annotation -->
    <line x1="320" y1="118" x2="320" y2="146" stroke="#3D434D" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="320" y="162" text-anchor="middle" class="chart-annot">−12% YoY</text>
  </svg>
  <p class="chart-source">Source · POS daily · updated 2026-04-27 09:14</p>
</div>
</body></html>
