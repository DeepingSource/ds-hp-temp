<!doctype html>
<html><head><meta charset="utf-8"><title>SAAI symbol</title>
<link rel="stylesheet" href="_card.css">
<style>body{padding:20px 22px;background:#fff;gap:18px}
.row{gap:28px;align-items:center}
.tile{display:flex;flex-direction:column;align-items:center;gap:8px}
.tile .l{font-size:10px;color:var(--grey-300);text-transform:uppercase;letter-spacing:.06em}
.swatch{width:90px;height:90px;display:flex;align-items:center;justify-content:center;border-radius:14px}
</style></head><body>
<div class="row">
  <div class="tile"><div class="swatch" style="background:#fff;border:1px solid var(--grey-50)"><img src="../assets/logos/symbol.svg" style="height:54px"></div><div class="l">on white</div></div>
  <div class="tile"><div class="swatch" style="background:var(--blue-500)"><img src="../assets/logos/symbol.svg" style="height:54px;filter:brightness(0) invert(1)"></div><div class="l">on brand</div></div>
  <div class="tile"><div class="swatch" style="background:var(--grey-900)"><img src="../assets/logos/symbol.svg" style="height:54px;filter:brightness(0) invert(1)"></div><div class="l">on dark</div></div>
  <div class="tile"><div class="swatch" style="background:var(--grey-25)"><img src="../assets/logos/symbol.svg" style="height:54px"></div><div class="l">on tint</div></div>
</div>
</body></html>
