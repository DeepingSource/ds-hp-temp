<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>body{padding:20px 22px;gap:14px}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-sans);font-size:13px;line-height:1;font-weight:500;border-radius:6px;padding:9px 14px;cursor:pointer;border:1px solid transparent;transition:background-color 150ms ease-out, color 150ms ease-out, border-color 150ms ease-out}
.btn.primary{background:var(--blue-500);color:#fff}
.btn.primary:hover{background:var(--blue-600)}
.btn.secondary{background:#fff;color:var(--grey-900);border-color:var(--grey-100)}
.btn.secondary:hover{background:rgba(120,127,137,0.08);border-color:var(--grey-200)}
.btn.ghost{background:transparent;color:var(--grey-700)}
.btn.ghost:hover{background:rgba(142,148,157,0.10)}
.btn.danger{background:#fff;color:var(--red-500);border-color:var(--red-100)}
.btn.danger:hover{background:#FCEEEE}
.btn.disabled{opacity:.3;cursor:not-allowed}
.btn .ic{width:14px;height:14px;display:inline-block}
.row{gap:10px;align-items:center}
.lbl{font-size:10px;color:var(--grey-300);width:64px;text-transform:uppercase;letter-spacing:.06em}
</style></head><body>
<div class="row"><div class="lbl">Primary</div>
  <button class="btn primary">Send</button>
  <button class="btn primary">New chat</button>
  <button class="btn primary disabled" disabled>Disabled</button>
</div>
<div class="row"><div class="lbl">Secondary</div>
  <button class="btn secondary">Cancel</button>
  <button class="btn secondary">Refresh suggestions</button>
  <button class="btn secondary disabled" disabled>Disabled</button>
</div>
<div class="row"><div class="lbl">Ghost</div>
  <button class="btn ghost">More</button>
  <button class="btn ghost">Settings</button>
  <button class="btn danger">Delete chat</button>
</div>
</body></html>
